<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bubblr</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%237d6f76%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%227.5%22%20cy%3D%227.5%22%20r%3D%22.5%22%20fill%3D%22%23E5751F%22%20stroke%3D%22%23E5751F%22%2F%3E%3Ccircle%20cx%3D%2218.5%22%20cy%3D%225.5%22%20r%3D%22.5%22%20fill%3D%22%23E5751F%22%20stroke%3D%22%23E5751F%22%2F%3E%3Ccircle%20cx%3D%2211.5%22%20cy%3D%2211.5%22%20r%3D%22.5%22%20fill%3D%22%23E5751F%22%20stroke%3D%22%23E5751F%22%2F%3E%3Ccircle%20cx%3D%227.5%22%20cy%3D%2216.5%22%20r%3D%22.5%22%20fill%3D%22%23E5751F%22%20stroke%3D%22%23E5751F%22%2F%3E%3Ccircle%20cx%3D%2217.5%22%20cy%3D%2214.5%22%20r%3D%22.5%22%20fill%3D%22%23E5751F%22%20stroke%3D%22%23E5751F%22%2F%3E%3Cpath%20d%3D%22M3%203v16a2%202%200%200%200%202%202h16%22%2F%3E%3C%2Fsvg%3E">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"
    onerror="console.warn('[bubblr] fontkit failed to load - custom font embedding disabled')"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --maroon: #861F41;
      --orange: #E5751F;
      --ink: #2b2228;
      --muted: #7d6f76;
      --line: #e6dde1;
      --ok: #2e7d4f
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      min-height: 100%
    }

    body {
      margin: 0;
      background: #E5E1E6;
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif
    }

    main {
      width: 100%;
      margin: 0 auto;
      padding: 20px 18px 50px;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    body.start main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 20px
    }

    .startPrompt {
      width: min(100%, 880px);
      margin: 0 0 0 20px;
      max-height: 0;
      overflow: hidden;
      color: #9b9fa3;
      text-align: center;
      font-size: clamp(2rem, 2.4vw, 3rem);
      font-weight: 650;
      letter-spacing: .2px;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      user-select: none;
      transition: opacity .24s ease, transform .24s ease, max-height .24s ease, margin .24s ease
    }

    body.start .startPrompt {
      margin-bottom: 1.4em;
      max-height: 3em;
      opacity: 0.5;
      transform: translateY(0);
    }

    .bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 10px;
      align-items: stretch;
      width: min(100%, 1100px);
      min-width: 0
    }

    .bar>* {
      min-width: 0
    }

    body.start .bar {
      width: min(100%, 880px);
      grid-template-columns: repeat(3, minmax(0, 1fr))
    }

    @media(max-width:720px) {
      body.ready .bar {
        grid-template-columns: repeat(3, minmax(0, 1fr))
      }

      body.ready button.dl {
        grid-column: 1 / -1
      }
    }

    @media(max-width:520px) {

      .bar,
      body.start .bar,
      body.ready .bar {
        grid-template-columns: 1fr
      }

      body.ready button.dl {
        grid-column: auto
      }

      .drop {
        height: auto;
        min-height: 54px;
        align-items: stretch;
        text-align: left
      }
    }

    .drop {
      border: 1.5px dashed #cdbcc4;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      background: #fff;
      transition: .15s;
      min-height: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center
    }

    .drop:hover,
    .drop.over,
    body.file-over .drop {
      border-color: var(--orange);
      background: #fff7ef
    }

    .drop.loaded {
      border-style: solid;
      border-color: var(--ok)
    }

    .drop b {
      font-size: 12.5px
    }

    .drop span {
      font-size: 11.5px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .drop input {
      display: none
    }

    button.dl {
      background: var(--orange);
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 0 22px;
      font: 600 14px system-ui;
      cursor: pointer;
      min-height: 54px;
      max-width: 100%
    }

    button.dl:hover {
      background: #cf6716
    }

    button.dl:disabled {
      background: #d8cdd2;
      cursor: not-allowed
    }

    body.start button.dl {
      display: none !important
    }

    details {
      display: none;
      width: min(100%, 1100px);
      margin-top: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px
    }

    body.ready details {
      display: block
    }

    summary {
      cursor: pointer;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--maroon);
      letter-spacing: .5px;
      user-select: none
    }

    .adv {
      padding: 0 14px 14px;
      display: none
    }

    details[open] .adv {
      display: block
    }

    .opts {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 12px
    }

    .opt label {
      display: block;
      font-size: 10.5px;
      letter-spacing: .4px;
      color: var(--muted);
      margin-bottom: 3px
    }

    .opt input,
    .opt select {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 8px;
      font: 13px system-ui;
      width: 96px;
      background: #fff
    }

    .opt input#optDate {
      width: 150px
    }

    .opt input#optBubbleMin,
    .opt input#optBubbleMax {
      width: 132px
    }

    .optGroups {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin: 0 0 12px
    }

    .optGroup {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px 12px;
      background: #fff
    }

    .optGroup .opts {
      margin-bottom: 0
    }

    .opt input#optStrokeW,
    .opt input#optNumSize {
      width: 92px
    }

    .hexPick {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .hexPick .swatch {
      width: 26px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #000;
      padding: 0;
      cursor: text
    }

    .hexPick input {
      width: 86px;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      text-transform: uppercase
    }

    .hexPick.bad input,
    .hexPick.bad .swatch {
      border-color: #b3261e
    }

    .opt select#optFormat {
      width: 104px
    }

    .opt select#optSheet {
      width: 170px
    }

    .tablewrap {
      max-height: 300px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px
    }

    .dataMsg {
      display: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      color: var(--muted);
      font-size: 12.5px;
      background: #fff
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12.5px
    }

    th {
      font-size: 10px;
      letter-spacing: .4px;
      color: var(--muted);
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid var(--line)
    }

    td {
      padding: 2px 4px;
      border-bottom: 1px solid #f1eaed
    }

    td input {
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 4px 6px;
      font: 12.5px system-ui;
      width: 100%;
      background: transparent
    }

    td input:hover {
      border-color: var(--line)
    }

    td input:focus {
      border-color: var(--orange);
      outline: none;
      background: #fff
    }

    td input.n {
      width: 62px;
      text-align: right
    }

    td.x {
      width: 26px;
      text-align: center
    }

    td.x button,
    #addRow {
      border: 0;
      background: none;
      color: #b9a8b0;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px
    }

    td.x button:hover {
      color: #b3261e;
      background: #fbeeed
    }

    #addRow {
      display: block;
      margin: 6px 0 0;
      color: var(--maroon);
      font-size: 12.5px
    }

    #addRow:hover {
      background: #f7eef2
    }

    tr.top td:first-child {
      box-shadow: inset 3px 0 0 var(--orange)
    }

    #pv {
      width: min(100%, 1100px);
      margin-top: 0;
      display: block;
      position: relative;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transform: translateY(6px);
      transition: max-height .24s ease, opacity .18s ease, transform .18s ease, margin-top .24s ease
    }

    body.ready #pv {
      margin-top: 14px;
      max-height: 1600px;
      opacity: 1;
      overflow: visible;
      pointer-events: auto;
      transform: translateY(0)
    }

    #pv canvas {
      width: 100%;
      display: block;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff
    }

    #pv.loading:not(.primed) canvas {
      min-height: clamp(240px, 45vw, 520px)
    }

    #editLayer {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      overflow: hidden
    }

    .editHit {
      position: absolute;
      border: 1px solid transparent;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0);
      padding: 0;
      cursor: text;
      pointer-events: auto
    }

    .editHit:hover {
      border-color: var(--orange);
      background: rgba(229, 117, 31, .10)
    }

    .editInput {
      position: absolute;
      z-index: 3;
      border: 1px solid var(--orange);
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      font: 13px system-ui;
      padding: 3px 5px;
      box-shadow: 0 2px 10px rgba(43, 34, 40, .18);
      pointer-events: auto;
      user-select: text
    }

    #pv.busy::after {
      content: "";
      position: absolute;
      top: 10px;
      right: 10px;
      width: 14px;
      height: 14px;
      border: 2px solid var(--orange);
      border-top-color: transparent;
      border-radius: 50%;
      animation: sp .7s linear infinite
    }

    @keyframes sp {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="startPrompt">Drop files here to get started.</div>
    <div class="bar">
      <div class="drop" id="dropAi" title="The base Illustrator file, saved as .ai with PDF compatibility.">
        <input type="file" id="fileAi" accept=".ai,.pdf,application/pdf">
        <b>Illustrator file</b><span id="aiLabel">.ai</span>
      </div>
      <div class="drop" id="dropXl"
        title="The spreadsheet containing the data to visualize. (.xlsx/.xlsm)">
        <input type="file" id="fileXl" accept=".xlsx,.xlsm,.xls,.csv">
        <b>Spreadsheet</b><span id="xlLabel">.xlsx / .xlsm</span>
      </div>
      <div class="drop" id="dropFont"
        title="Optional .ttf/.otf fonts, used where the file's embedded fonts can't cover new text. Uploaded fonts are matched to the font names used in the Illustrator file.">
        <input type="file" id="fileFont" accept=".ttf,.otf" multiple>
        <b>Fonts</b><span id="fontLabel">.ttf / .otf</span>
      </div>
      <button class="dl" id="btnDl" disabled title="Download the updated file in the selected format">Download</button>
    </div>

    <div id="pv"><canvas id="pvCanvas"></canvas>
      <div id="editLayer"></div>
    </div>

    <details id="advanced">
      <summary>Advanced</summary>
      <div class="adv">
        <div class="opts">
          <div class="opt" title="How many risks get the emphasized bubble style"><label for="optTopN">Emphasized
              N</label>
            <input type="number" id="optTopN" value="10" min="0" step="1">
          </div>
          <div class="opt" title="Value mapped to the left/bottom edge of the plot"><label for="optMin">Axis min</label>
            <input type="number" id="optMin" step="0.5" placeholder="0 auto">
          </div>
          <div class="opt" title="Value mapped to the right/top edge of the plot"><label for="optMax">Axis max</label>
            <input type="number" id="optMax" step="0.5" placeholder="6 auto">
          </div>
          <div class="opt"
            title="Minimum bubble diameter in PDF points; blank keeps the size inferred from the Illustrator file">
            <label for="optBubbleMin">Min size</label>
            <input type="number" id="optBubbleMin" min="1" step="0.5" placeholder="Auto">
          </div>
          <div class="opt"
            title="Maximum bubble diameter in PDF points; blank keeps the size inferred from the Illustrator file">
            <label for="optBubbleMax">Max size</label>
            <input type="number" id="optBubbleMax" min="1" step="0.5" placeholder="Auto">
          </div>
          <div class="opt" title="Replaces the date label under the title; blank keeps the existing label"><label
              for="optDate">Date label</label>
            <input type="text" id="optDate" value="">
          </div>
          <div class="opt" title="Format used when Download is pressed"><label for="optFormat">Export format</label>
            <select id="optFormat">
              <option value="pdf" selected>PDF</option>
              <option value="ai">AI</option>
              <option value="svg">SVG</option>
              <option value="png">PNG</option>
              <option value="jpg">JPG</option>
            </select>
          </div>
          <div class="opt" title="Spreadsheet worksheet to parse; Auto checks Formulas first, then compatible sheets">
            <label for="optSheet">Worksheet</label>
            <select id="optSheet" disabled>
              <option value="">Auto</option>
            </select>
          </div>
        </div>
        <div class="optGroups">
          <div class="optGroup" id="bubbleStyleGroup">
            <div class="opts">
              <div class="opt" title="Fill color used for emphasized bubbles; blank keeps the Illustrator file value">
                <label for="optTopFill">Emphasized fill</label>
                <div class="hexPick"><button type="button" class="swatch" data-color-for="optTopFill"
                    aria-label="Edit emphasized fill color"></button><input type="text" id="optTopFill" maxlength="7"
                    spellcheck="false" placeholder="Auto"></div>
              </div>
              <div class="opt" title="Stroke color used for emphasized bubbles; blank keeps the Illustrator file value">
                <label for="optTopStroke">Emphasized stroke</label>
                <div class="hexPick"><button type="button" class="swatch" data-color-for="optTopStroke"
                    aria-label="Edit emphasized stroke color"></button><input type="text" id="optTopStroke"
                    maxlength="7" spellcheck="false" placeholder="Auto"></div>
              </div>
              <div class="opt" title="Fill color used for standard bubbles; blank keeps the Illustrator file value">
                <label for="optStdFill">Standard fill</label>
                <div class="hexPick"><button type="button" class="swatch" data-color-for="optStdFill"
                    aria-label="Edit standard fill color"></button><input type="text" id="optStdFill" maxlength="7"
                    spellcheck="false" placeholder="Auto"></div>
              </div>
              <div class="opt" title="Stroke color used for standard bubbles; blank keeps the Illustrator file value">
                <label for="optStdStroke">Standard stroke</label>
                <div class="hexPick"><button type="button" class="swatch" data-color-for="optStdStroke"
                    aria-label="Edit standard stroke color"></button><input type="text" id="optStdStroke" maxlength="7"
                    spellcheck="false" placeholder="Auto"></div>
              </div>
              <div class="opt" title="Bubble stroke thickness in PDF points; blank keeps the Illustrator file value">
                <label for="optStrokeW">Stroke width</label>
                <input type="number" id="optStrokeW" min="0" step="0.25" placeholder="Auto">
              </div>
            </div>
          </div>
          <div class="optGroup" id="labelStyleGroup">
            <div class="opts">
              <div class="opt" title="Color used for numbers inside bubbles; blank keeps the Illustrator file value">
                <label for="optNumColor">Label color</label>
                <div class="hexPick"><button type="button" class="swatch" data-color-for="optNumColor"
                    aria-label="Edit label color"></button><input type="text" id="optNumColor" maxlength="7"
                    spellcheck="false" placeholder="Auto"></div>
              </div>
              <div class="opt" title="Bubble number font size in PDF points; blank keeps the Illustrator file value">
                <label for="optNumSize">Label size</label>
                <input type="number" id="optNumSize" min="1" step="0.5" placeholder="Auto">
              </div>
            </div>
          </div>
          <div class="optGroup" id="legendStyleGroup">
            <div class="opts">
              <div class="opt"
                title="Color used for risk numbers and names in the legend; blank keeps the Illustrator file value">
                <label for="optLegendColor">Legend color</label>
                <div class="hexPick"><button type="button" class="swatch" data-color-for="optLegendColor"
                    aria-label="Edit legend color"></button><input type="text" id="optLegendColor" maxlength="7"
                    spellcheck="false" placeholder="Auto"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="dataMsg" id="dataMsg">No parseable risk data on this worksheet.</div>
        <div class="tablewrap" id="tableWrap" style="display:none">
          <table id="riskTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Risk</th>
                <th>Impact</th>
                <th>Likelihood</th>
                <th>Velocity</th>
                <th>Score</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <button id="addRow" style="display:none" title="Add a risk row">+ row</button>
      </div>
    </details>
  </main>

  <script>
    /* ============================================================
     * Parses an Illustrator (.ai, PDF-compatible) heat-map file,
     * removes the existing bubbles / bubble numbers / legend rows,
     * and redraws them from spreadsheet data.
     * Requires: pdf-lib (PDFLib), pako, SheetJS (XLSX).
     * ============================================================ */
    (function (root, factory) {
      let PDFLibRef, pakoRef;
      if (typeof PDFLib !== 'undefined') PDFLibRef = PDFLib;
      if (typeof pako !== 'undefined') pakoRef = pako;
      if ((!PDFLibRef || !pakoRef) && typeof require === 'function') {
        try { PDFLibRef = PDFLibRef || require('pdf-lib'); pakoRef = pakoRef || require('pako'); } catch (e) { /* browser */ }
      }
      const api = factory(PDFLibRef || (root && root.PDFLib), pakoRef || (root && root.pako));
      if (typeof module === 'object' && module && module.exports) module.exports = api;
      if (root) root.RiskMapCore = api;
    }(typeof self !== 'undefined' ? self : this, function (PDFLib, pako) {
      'use strict';
      const { PDFDocument, PDFName, PDFDict, PDFArray, PDFRef, PDFRawStream, PDFString, PDFNumber, StandardFonts, rgb } = PDFLib;

      /* ---------------- spreadsheet parsing ---------------- */
      function parseRisksFromWorkbook(XLSX, workbook, parseOpts) {
        parseOpts = parseOpts || {};
        const num = v => (typeof v === 'number' && isFinite(v)) ? v : (typeof v === 'string' && v.trim() !== '' && isFinite(+v) ? +v : null);
        const clean = v => (v == null) ? '' : String(v).replace(/\s+/g, ' ').trim();
        const norm = v => clean(v).toLowerCase();

        function rowsFor(sheetName) {
          return XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
            header: 1,
            raw: true,
            defval: null
          });
        }

        function findHeader(row, patterns) {
          for (let i = 0; i < row.length; i++) {
            const txt = norm(row[i]);
            if (!txt) continue;
            for (const re of patterns) if (re.test(txt)) return i;
          }
          return -1;
        }

        function parseRows(sheetName, rows, headerRowIndex, cols, sourceType) {
          const risks = [];

          for (let r = headerRowIndex + 1; r < rows.length; r++) {
            const row = rows[r] || [];
            const name = clean(row[cols.name]);
            if (!name || /^#n\/a$/i.test(name)) continue;

            const impact = num(row[cols.impact]);
            const likelihood = num(row[cols.likelihood]);
            const velocity = cols.velocity >= 0 ? num(row[cols.velocity]) : 3;
            if (impact === null || likelihood === null) continue;

            const explicitNum = cols.num >= 0 ? num(row[cols.num]) : null;
            const score = cols.score >= 0 ? num(row[cols.score]) : null;

            risks.push({
              num: explicitNum ?? risks.length + 1,
              name,
              impact,
              likelihood,
              velocity: velocity === null ? 3 : velocity,
              score,
            });
          }

          if (!risks.length) return null;

          rankRisks(risks);
          risks.sort((a, b) => a.num - b.num);

          return {
            sheetName,
            sourceType,
            headerRow: headerRowIndex + 1,
            risks,
          };
        }

        function tryParseFormulaStyleSheet(sheetName, rows) {
          for (let r = 0; r < Math.min(rows.length, 30); r++) {
            const row = rows[r] || [];

            const cols = {
              num: findHeader(row, [/^#$/, /^number$/]),
              name: findHeader(row, [/^risk$/]),
              likelihood: findHeader(row, [/^x\s*axis\s*-\s*likelihood$/, /^likelihood$/]),
              impact: findHeader(row, [/^y\s*axis\s*-\s*impact$/, /^impact$/]),
              velocity: findHeader(row, [/^bubble\s*size\s*-\s*velocity$/, /^velocity$/]),
              score: findHeader(row, [/^risk\s*score$/]),
            };

            if (cols.name >= 0 && cols.likelihood >= 0 && cols.impact >= 0) {
              const parsed = parseRows(sheetName, rows, r, cols, 'formulas');
              if (parsed) return parsed;
            }
          }
          return null;
        }

        function tryParseRiskRegisterSheet(sheetName, rows) {
          for (let r = 0; r < Math.min(rows.length, 30); r++) {
            const row = rows[r] || [];

            const cols = {
              num: findHeader(row, [/^#$/]),
              name: findHeader(row, [/^risk$/]),
              impact: findHeader(row, [/^impact$/]),
              likelihood: findHeader(row, [/^likelihood$/]),
              velocity: findHeader(row, [/^velocity/]),
              score: findHeader(row, [/^risk\s*score$/]),
            };

            if (cols.name >= 0 && cols.impact >= 0 && cols.likelihood >= 0) {
              const parsed = parseRows(sheetName, rows, r, cols, 'risk register');
              if (parsed) return parsed;
            }
          }
          return null;
        }

        function tryParseAnySupportedSheet(sheetName) {
          const rows = rowsFor(sheetName);
          return tryParseFormulaStyleSheet(sheetName, rows) || tryParseRiskRegisterSheet(sheetName, rows);
        }

        const selectedSheetName = parseOpts.sheetName && workbook.SheetNames.includes(parseOpts.sheetName)
          ? parseOpts.sheetName
          : null;

        if (selectedSheetName) {
          const parsed = tryParseAnySupportedSheet(selectedSheetName);
          if (parsed) return parsed;
          throw new Error('Could not find risk data on the selected worksheet "' + selectedSheetName + '".');
        }

        const formulasSheetName =
          workbook.SheetNames.find(n => /^formulas$/i.test(n)) ||
          workbook.SheetNames.find(n => /formula/i.test(n));

        if (formulasSheetName) {
          const parsed = tryParseFormulaStyleSheet(formulasSheetName, rowsFor(formulasSheetName));
          if (parsed) return parsed;
        }

        for (const sheetName of workbook.SheetNames) {
          if (sheetName === formulasSheetName) continue;
          const parsed = tryParseFormulaStyleSheet(sheetName, rowsFor(sheetName));
          if (parsed) return parsed;
        }

        const registerSheetName =
          workbook.SheetNames.find(n => /register/i.test(n)) ||
          workbook.SheetNames[0];

        if (registerSheetName) {
          const parsed = tryParseRiskRegisterSheet(registerSheetName, rowsFor(registerSheetName));
          if (parsed) return parsed;
        }

        throw new Error('Could not find risk data. Expected the Formulas sheet to contain Risk, X Axis - Likelihood, Y axis - Impact, and Bubble Size - Velocity columns.');
      }

      function rankRisks(risks) {
        const ranked = risks.slice().sort((a, b) => (b.score ?? -Infinity) - (a.score ?? -Infinity));
        ranked.forEach((r, i) => { r.rank = (r.score != null) ? i + 1 : r.num; });
        return risks;
      }

      /* ---------------- content-stream tokenizer ---------------- */
      function tokenize(s) {
        const toks = []; let i = 0; const n = s.length;
        const isWS = c => c === ' ' || c === '\n' || c === '\r' || c === '\t' || c === '\f' || c === '\x00';
        const isDelim = c => c === '(' || c === ')' || c === '<' || c === '>' || c === '[' || c === ']' || c === '{' || c === '}' || c === '/' || c === '%';
        while (i < n) {
          const c = s[i];
          if (isWS(c)) { i++; continue; }
          const start = i;
          if (c === '%') { while (i < n && s[i] !== '\n' && s[i] !== '\r') i++; continue; }
          if (c === '(') {
            let depth = 1; i++;
            while (i < n && depth > 0) {
              if (s[i] === '\\') { i += 2; continue; }
              if (s[i] === '(') depth++; else if (s[i] === ')') depth--;
              i++;
            }
            toks.push({ t: 'str', raw: s.slice(start, i), start, end: i }); continue;
          }
          if (c === '<' && s[i + 1] === '<') {
            let depth = 0; let j = i;
            while (j < n) {
              if (s[j] === '<' && s[j + 1] === '<') { depth++; j += 2; continue; }
              if (s[j] === '>' && s[j + 1] === '>') { depth--; j += 2; if (!depth) break; continue; }
              j++;
            }
            toks.push({ t: 'dict', raw: s.slice(start, j), start, end: j }); i = j; continue;
          }
          if (c === '<') { i++; while (i < n && s[i] !== '>') i++; i++; toks.push({ t: 'hex', raw: s.slice(start, i), start, end: i }); continue; }
          if (c === '[') { toks.push({ t: '[', raw: '[', start, end: i + 1 }); i++; continue; }
          if (c === ']') { toks.push({ t: ']', raw: ']', start, end: i + 1 }); i++; continue; }
          if (c === '/') { i++; while (i < n && !isWS(s[i]) && !isDelim(s[i])) i++; toks.push({ t: 'name', raw: s.slice(start, i), start, end: i }); continue; }
          if (c === '+' || c === '-' || c === '.' || (c >= '0' && c <= '9')) {
            i++; while (i < n && !isWS(s[i]) && !isDelim(s[i])) i++;
            const raw = s.slice(start, i);
            toks.push({ t: 'num', raw, val: parseFloat(raw), start, end: i }); continue;
          }
          i++; while (i < n && !isWS(s[i]) && !isDelim(s[i])) i++;
          toks.push({ t: 'op', raw: s.slice(start, i), start, end: i });
        }
        return toks;
      }

      function toOps(toks) {
        const ops = []; let args = []; let argStart = -1;
        for (let i = 0; i < toks.length; i++) {
          const tk = toks[i];
          if (tk.t === '[') {
            const items = []; const aStart = tk.start; let j = i + 1;
            while (j < toks.length && toks[j].t !== ']') { items.push(toks[j]); j++; }
            const aEnd = j < toks.length ? toks[j].end : tk.end;
            args.push({ t: 'array', items, start: aStart, end: aEnd });
            if (argStart < 0) argStart = aStart;
            i = j; continue;
          }
          if (tk.t === 'op') {
            ops.push({ op: tk.raw, args, start: argStart >= 0 ? argStart : tk.start, end: tk.end, opStart: tk.start });
            args = []; argStart = -1;
          } else {
            args.push(tk);
            if (argStart < 0) argStart = tk.start;
          }
        }
        return ops;
      }

      function decodeLiteral(raw) {
        let out = '';
        for (let i = 1; i < raw.length - 1; i++) {
          let c = raw[i];
          if (c === '\\') {
            const d = raw[++i];
            if (d === 'n') out += '\n'; else if (d === 'r') out += '\r'; else if (d === 't') out += '\t';
            else if (d === 'b') out += '\b'; else if (d === 'f') out += '\f';
            else if (d >= '0' && d <= '7') {
              let oct = d;
              for (let k = 0; k < 2 && raw[i + 1] >= '0' && raw[i + 1] <= '7'; k++) oct += raw[++i];
              out += String.fromCharCode(parseInt(oct, 8));
            } else if (d === '\n' || d === '\r') { /* line continuation */ }
            else out += d;
          } else out += c;
        }
        return out;
      }

      function decodeHexStr(raw) {
        const hx = raw.slice(1, -1).replace(/[^0-9a-fA-F]/g, '');
        let out = '';
        for (let i = 0; i < hx.length; i += 2) out += String.fromCharCode(parseInt(hx.substr(i, 2).padEnd(2, '0'), 16));
        return out;
      }

      function decodeShownText(arg) {
        if (!arg) return '';
        if (arg.t === 'str') return decodeLiteral(arg.raw);
        if (arg.t === 'hex') return decodeHexStr(arg.raw);
        if (arg.t === 'array') {
          let out = '';
          for (const item of arg.items) {
            if (item.t === 'str' || item.t === 'hex') {
              out += item.t === 'str' ? decodeLiteral(item.raw) : decodeHexStr(item.raw);
            } else if (item.t === 'num' && item.val < -140 && /\S$/.test(out)) {
              out += ' ';
            }
          }
          return out;
        }
        return '';
      }

      const matMul = (m, n) => [
        m[0] * n[0] + m[1] * n[2], m[0] * n[1] + m[1] * n[3],
        m[2] * n[0] + m[3] * n[2], m[2] * n[1] + m[3] * n[3],
        m[4] * n[0] + m[5] * n[2] + n[4], m[4] * n[1] + m[5] * n[3] + n[5],
      ];
      const applyMat = (m, x, y) => [m[0] * x + m[2] * y + m[4], m[1] * x + m[3] * y + m[5]];
      const IDENT = [1, 0, 0, 1, 0, 0];
      const cmykToRgb = (c, m, y, k) => [(1 - Math.min(1, c + k)), (1 - Math.min(1, m + k)), (1 - Math.min(1, y + k))];

      /* ---------------- analyze a content stream ---------------- */
      function analyze(content) {
        const ops = toOps(tokenize(content));
        const st = () => ({ ctm: IDENT.slice(), fill: [0, 0, 0], stroke: [0, 0, 0], lw: 1 });
        const stack = []; let g = st();
        const circles = [];
        const clipRects = [];
        let pendingClip = false;
        let path = null;
        let shClipIdx = -1;

        let inText = false, tm = IDENT.slice(), tlm = IDENT.slice(), TL = 0;
        let fontRes = null, fontSize = 0;
        const segments = []; let seg = null;

        const effectiveTextMatrix = base => matMul([
          base[0] * (fontSize || 1), base[1] * (fontSize || 1),
          base[2] * (fontSize || 1), base[3] * (fontSize || 1),
          base[4], base[5]
        ], g.ctm);

        const newSeg = () => {
          const matrix = effectiveTextMatrix(tlm);
          seg = { x: matrix[4], y: matrix[5], size: Math.hypot(matrix[0], matrix[1]), matrix, fontRes, fill: g.fill.slice(), shows: [], tdys: [] };
          segments.push(seg);
        };

        const beginPath = (startChar) => { path = { xs: [], ys: [], moves: 0, curves: 0, lines: 0, rects: 0, startChar }; };
        const addPt = (x, y) => { const p = applyMat(g.ctm, x, y); path.xs.push(p[0]); path.ys.push(p[1]); };

        for (let i = 0; i < ops.length; i++) {
          const o = ops[i]; const a = o.args; const v = j => a[j] && a[j].val;
          switch (o.op) {
            case 'q': stack.push(g); g = { ctm: g.ctm.slice(), fill: g.fill.slice(), stroke: g.stroke.slice(), lw: g.lw }; break;
            case 'Q': g = stack.pop() || st(); break;
            case 'cm': g.ctm = matMul([v(0), v(1), v(2), v(3), v(4), v(5)], g.ctm); break;
            case 'w': g.lw = v(0); break;
            case 'rg': g.fill = [v(0), v(1), v(2)]; break;
            case 'RG': g.stroke = [v(0), v(1), v(2)]; break;
            case 'g': g.fill = [v(0), v(0), v(0)]; break;
            case 'G': g.stroke = [v(0), v(0), v(0)]; break;
            case 'k': g.fill = cmykToRgb(v(0), v(1), v(2), v(3)); break;
            case 'K': g.stroke = cmykToRgb(v(0), v(1), v(2), v(3)); break;
            case 'm': if (!path) beginPath(o.start); path.moves++; addPt(v(0), v(1)); break;
            case 'l': if (path) { path.lines++; addPt(v(0), v(1)); } break;
            case 'c': if (path) { path.curves++; addPt(v(0), v(1)); addPt(v(2), v(3)); addPt(v(4), v(5)); } break;
            case 'v': case 'y': if (path) { path.curves++; addPt(v(0), v(1)); addPt(v(2), v(3)); } break;
            case 'h': break;
            case 're': {
              if (!path) beginPath(o.start);
              path.rects++;
              addPt(v(0), v(1)); addPt(v(0) + v(2), v(1) + v(3));
              break;
            }
            case 'W': case 'W*': pendingClip = true; break;
            case 'n': case 'f': case 'f*': case 'F': case 'S': case 's': case 'B': case 'B*': case 'b': case 'b*': {
              if (path && path.xs.length) {
                const x0 = Math.min(...path.xs), x1 = Math.max(...path.xs);
                const y0 = Math.min(...path.ys), y1 = Math.max(...path.ys);
                const w = x1 - x0, h = y1 - y0;
                if (pendingClip && path.rects > 0) clipRects.push({ x: x0, y: y0, w, h, opIdx: i });
                if (o.op !== 'n' && path.moves === 1 && path.curves >= 3 && path.lines === 0 && w > 2 && h > 2 &&
                  Math.abs(w - h) / Math.max(w, h) < 0.18) {
                  circles.push({
                    cx: (x0 + x1) / 2, cy: (y0 + y1) / 2, r: (w + h) / 4,
                    paint: o.op, fill: g.fill.slice(), stroke: g.stroke.slice(), lw: g.lw,
                    range: [path.startChar, o.end],
                  });
                }
              }
              path = null; pendingClip = false;
              break;
            }
            case 'sh': shClipIdx = clipRects.length - 1; break;
            case 'BT': inText = true; tm = IDENT.slice(); tlm = IDENT.slice(); TL = 0; seg = null; break;
            case 'ET': inText = false; seg = null; break;
            case 'Tf': fontRes = a[0] ? a[0].raw : fontRes; fontSize = v(1) || 1; break;
            case 'TL': TL = v(0) || 0; break;
            case 'Tm': tm = [v(0), v(1), v(2), v(3), v(4), v(5)]; tlm = tm.slice(); newSeg(); break;
            case 'Td': case 'TD': {
              const tx = v(0) || 0, ty = v(1) || 0;
              if (o.op === 'TD') TL = -ty;
              tlm = matMul([1, 0, 0, 1, tx, ty], tlm);
              if (seg && ty) seg.tdys.push(ty);
              if (!seg && inText) newSeg();
              break;
            }
            case 'T*': tlm = matMul([1, 0, 0, 1, 0, -TL], tlm); if (seg) seg.tdys.push(-TL); break;
            case 'Tj': case '\'': case '"': case 'TJ': {
              if (!seg && inText) newSeg();
              if (seg) {
                const strArg = (o.op === '"') ? a[2] : a[0];
                const matrix = effectiveTextMatrix(tlm);
                seg.shows.push({ text: decodeShownText(strArg), start: o.start, end: o.end, x: matrix[4], y: matrix[5], matrix, fontRes });
              }
              break;
            }
            default: break;
          }
        }

        const plotRect = shClipIdx >= 0 ? clipRects[shClipIdx] : null;
        return { ops, circles, clipRects, plotRect, segments };
      }

      /* ---------------- glyph coverage / encoding for original fonts ---------------- */
      const GLYPH_NAMES = (() => {
        const m = {
          ' ': 'space', '!': 'exclam', '"': 'quotedbl', '#': 'numbersign', '$': 'dollar', '%': 'percent',
          '&': 'ampersand', "'": 'quotesingle', '(': 'parenleft', ')': 'parenright', '*': 'asterisk',
          '+': 'plus', ',': 'comma', '-': 'hyphen', '.': 'period', '/': 'slash', ':': 'colon',
          ';': 'semicolon', '<': 'less', '=': 'equal', '>': 'greater', '?': 'question', '@': 'at',
          '[': 'bracketleft', ']': 'bracketright', '_': 'underscore',
          '\u2019': 'quoteright', '\u2018': 'quoteleft', '\u201C': 'quotedblleft', '\u201D': 'quotedblright',
          '\u2013': 'endash', '\u2014': 'emdash',
        };
        const dig = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
        for (let i = 0; i <= 9; i++) m[String(i)] = dig[i];
        for (let i = 0; i < 26; i++) { m[String.fromCharCode(65 + i)] = String.fromCharCode(65 + i); m[String.fromCharCode(97 + i)] = String.fromCharCode(97 + i); }
        return m;
      })();

      const WINANSI_EXTRA = { '\u2019': 0x92, '\u2018': 0x91, '\u201C': 0x93, '\u201D': 0x94, '\u2013': 0x96, '\u2014': 0x97, '\u2022': 0x95 };

      function pdfNameText(obj) {
        if (!obj) return '';
        try {
          if (obj.decodeText) return obj.decodeText();
          if (obj.asString) return obj.asString();
        } catch (e) { /* fall through */ }
        return String(obj).replace(/^\//, '');
      }

      function cleanPdfFontName(name) {
        return String(name || '')
          .replace(/^\//, '')
          .replace(/^[A-Z]{6}\+/, '')
          .trim();
      }

      function fontExactKey(name) {
        return cleanPdfFontName(name)
          .replace(/\.(ttf|otf)$/i, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '');
      }

      function fontFamilyKey(name) {
        return cleanPdfFontName(name)
          .replace(/\.(ttf|otf)$/i, '')
          .replace(/[_-]+/g, ' ')
          .replace(/\b(regular|roman|book|medium|bold|semi\s*bold|semibold|demi\s*bold|demibold|extra\s*bold|extrabold|heavy|black|thin|light|extra\s*light|extralight|ultra\s*light|ultralight|italic|oblique|mt|ps)\b/gi, ' ')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '');
      }

      function fontStyleInfo(name) {
        const n = String(name || '').toLowerCase();
        let weight = 400;
        if (/thin/.test(n)) weight = 100;
        else if (/ultra\s*light|ultralight|extra\s*light|extralight/.test(n)) weight = 200;
        else if (/light/.test(n)) weight = 300;
        else if (/semi\s*bold|semibold|demi\s*bold|demibold/.test(n)) weight = 600;
        else if (/extra\s*bold|extrabold|heavy|black/.test(n)) weight = 800;
        else if (/bold/.test(n)) weight = 700;
        else if (/medium/.test(n)) weight = 500;
        return { weight, italic: /italic|oblique/.test(n), bold: weight >= 600 };
      }

      function scoreUploadedFontMatch(file, targetNames) {
        const candNames = [
          file.name,
          file.meta && file.meta.postscriptName,
          file.meta && file.meta.fullName,
          file.meta && file.meta.familyName,
          file.meta && file.meta.subfamilyName ? ((file.meta.familyName || '') + ' ' + file.meta.subfamilyName) : '',
        ].filter(Boolean);

        let best = -Infinity;

        targetNames.filter(Boolean).forEach(target => {
          const targetExact = fontExactKey(target);
          const targetFamily = fontFamilyKey(target);
          const targetStyle = fontStyleInfo(target);

          candNames.forEach(candidate => {
            const candExact = fontExactKey(candidate);
            const candFamily = fontFamilyKey(candidate);
            const candStyle = fontStyleInfo(candidate);
            let score = 0;

            if (targetExact && candExact && targetExact === candExact) score += 1000;
            else if (targetExact && candExact && (targetExact.includes(candExact) || candExact.includes(targetExact))) score += 520;

            if (targetFamily && candFamily) {
              if (targetFamily === candFamily) score += 360;
              else if (targetFamily.includes(candFamily) || candFamily.includes(targetFamily)) score += 180;
            }

            score += Math.max(-120, 120 - Math.abs(targetStyle.weight - candStyle.weight) * 0.6);
            if (targetStyle.bold !== candStyle.bold) score -= 120;
            if (targetStyle.italic !== candStyle.italic) score -= 180;

            best = Math.max(best, score);
          });
        });

        return best;
      }

      function makeOriginalFontAdapter(ctx, fontDict, resName) {
        try {
          const lk = o => (o instanceof PDFRef) ? ctx.lookup(o) : o;
          const d = lk(fontDict);
          let baseFontName = cleanPdfFontName(pdfNameText(d.get(PDFName.of('BaseFont'))));
          const descendants = lk(d.get(PDFName.of('DescendantFonts')));
          const descendant = descendants && descendants.asArray ? lk(descendants.asArray()[0]) : null;
          const firstChar = d.get(PDFName.of('FirstChar'));
          const widthsObj = lk(d.get(PDFName.of('Widths')));
          let desc = lk(d.get(PDFName.of('FontDescriptor')));

          if (descendant) {
            baseFontName = baseFontName || cleanPdfFontName(pdfNameText(descendant.get(PDFName.of('BaseFont'))));
            desc = desc || lk(descendant.get(PDFName.of('FontDescriptor')));
          }

          const descriptorFontName = desc ? cleanPdfFontName(pdfNameText(desc.get(PDFName.of('FontName')))) : '';
          const displayName = baseFontName || descriptorFontName || resName;
          let charset = null;

          if (desc) {
            const cs = desc.get(PDFName.of('CharSet'));
            if (cs && cs.decodeText) charset = new Set(cs.decodeText().split('/').filter(Boolean));
            else if (cs && cs.value) charset = new Set(String(cs.value).split('/').filter(Boolean));
          }

          const fc = firstChar ? firstChar.asNumber() : 0;
          const widths = [];
          if (widthsObj && widthsObj.asArray) widthsObj.asArray().forEach((w, i) => { widths[fc + i] = lk(w).asNumber(); });

          const codeFor = ch => {
            const cc = ch.charCodeAt(0);
            if (cc < 128) return cc;
            if (WINANSI_EXTRA[ch] != null) return WINANSI_EXTRA[ch];
            return null;
          };

          const covers = ch => {
            const gname = GLYPH_NAMES[ch];
            if (charset) return !!(gname && charset.has(gname));
            const code = codeFor(ch);
            return code != null && widths[code] > 0;
          };

          return {
            kind: 'original',
            res: resName,
            label: displayName,
            fontName: displayName,
            targetNames: [baseFontName, descriptorFontName, resName].filter(Boolean),
            canRender: txt => [...String(txt ?? '')].every(covers),
            widthOf: (txt, size) => [...String(txt ?? '')].reduce((s, ch) => s + ((widths[codeFor(ch)] || 520) / 1000) * size, 0),
            encode: txt => '(' + [...String(txt ?? '')].map(ch => {
              const code = codeFor(ch);
              const c = String.fromCharCode(code == null ? 63 : code);
              return (c === '(' || c === ')' || c === '\\') ? '\\' + c : (code > 126 || code < 32) ? '\\' + code.toString(8).padStart(3, '0') : c;
            }).join('') + ')',
          };
        } catch (e) {
          return null;
        }
      }

      function makePdfLibFontAdapter(font, resName, label, kind) {
        return {
          kind: kind || 'embedded',
          res: resName,
          label: label || resName,
          font,
          canRender: txt => {
            try {
              txt = String(txt ?? '');
              font.encodeText(txt);
              font.widthOfTextAtSize(txt, 12);
              return true;
            } catch (e) {
              return false;
            }
          },
          widthOf: (txt, size) => {
            try {
              return font.widthOfTextAtSize(String(txt ?? ''), size);
            } catch (e) {
              return String(txt ?? '').length * size * 0.55;
            }
          },
          encode: txt => font.encodeText(String(txt ?? '')).toString(),
        };
      }

      const fmt = n => {
        const r = Math.round(n * 1000) / 1000;
        return Object.is(r, -0) ? '0' : String(r);
      };

      const K = 0.5522847498;

      function circlePath(cx, cy, r) {
        const k = K * r;
        return [
          `${fmt(cx + r)} ${fmt(cy)} m`,
          `${fmt(cx + r)} ${fmt(cy + k)} ${fmt(cx + k)} ${fmt(cy + r)} ${fmt(cx)} ${fmt(cy + r)} c`,
          `${fmt(cx - k)} ${fmt(cy + r)} ${fmt(cx - r)} ${fmt(cy + k)} ${fmt(cx - r)} ${fmt(cy)} c`,
          `${fmt(cx - r)} ${fmt(cy - k)} ${fmt(cx - k)} ${fmt(cy - r)} ${fmt(cx)} ${fmt(cy - r)} c`,
          `${fmt(cx + k)} ${fmt(cy - r)} ${fmt(cx + r)} ${fmt(cy - k)} ${fmt(cx + r)} ${fmt(cy)} c`,
          'h',
        ].join('\n');
      }


      function cleanEditableText(text) {
        return String(text || '').replace(/\s+/g, ' ').trim();
      }

      function textMatrixToTm(matrix) {
        return `${fmt(matrix[0])} ${fmt(matrix[1])} ${fmt(matrix[2])} ${fmt(matrix[3])} ${fmt(matrix[4])} ${fmt(matrix[5])} Tm`;
      }

      function textBoundsFor(font, text, matrix) {
        const width = Math.max(1, font.widthOf(cleanEditableText(text) || 'M', 1));
        const pts = [
          applyMat(matrix, 0, -0.25),
          applyMat(matrix, width, -0.25),
          applyMat(matrix, 0, 1.05),
          applyMat(matrix, width, 1.05),
        ];
        return [
          Math.min(...pts.map(p => p[0])),
          Math.min(...pts.map(p => p[1])),
          Math.max(...pts.map(p => p[0])),
          Math.max(...pts.map(p => p[1])),
        ];
      }

      function alignedTextMatrix(matrix, oldFont, oldText, newFont, newText, align) {
        const m = matrix.slice();
        const oldW = Math.max(0, oldFont.widthOf(cleanEditableText(oldText), 1));
        const newW = Math.max(0, newFont.widthOf(cleanEditableText(newText), 1));
        const t = align === 'right' ? 1 : align === 'center' ? 0.5 : 0;
        const anchorX = matrix[4] + matrix[0] * oldW * t;
        const anchorY = matrix[5] + matrix[1] * oldW * t;
        m[4] = anchorX - matrix[0] * newW * t;
        m[5] = anchorY - matrix[1] * newW * t;
        return m;
      }

      function centeredTextMatrix(matrix, oldFont, oldText, newFont, newText) {
        return alignedTextMatrix(matrix, oldFont, oldText, newFont, newText, 'center');
      }

      function rectLike(x, y, w, h) {
        return isFinite(x) && isFinite(y) && isFinite(w) && isFinite(h) ? { x, y, w, h } : null;
      }

      function addTextAnchorSamples(rect, addAnchor) {
        if (!rect || !isFinite(rect.x) || !isFinite(rect.y) || !isFinite(rect.w) || !isFinite(rect.h)) return;
        const x0 = rect.x, x1 = rect.x + rect.w, y0 = rect.y, y1 = rect.y + rect.h;
        const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
        [0, 0.25, 0.5, 0.75, 1].forEach(t => {
          addAnchor(x0 + rect.w * t, cy);
          addAnchor(cx, y0 + rect.h * t);
        });
        addAnchor(x0, cy);
        addAnchor(x1, cy);
        addAnchor(cx, y0);
        addAnchor(cx, y1);
      }

      function inferArtworkRect(circles, segments, plotRect) {
        const xs = [], ys = [];
        const add = (x, y) => {
          if (isFinite(x) && isFinite(y)) { xs.push(x); ys.push(y); }
        };
        const addRect = r => {
          if (!r) return;
          add(r.x, r.y);
          add(r.x + r.w, r.y + r.h);
        };

        addRect(plotRect);
        (circles || []).forEach(c => {
          add(c.cx - c.r, c.cy - c.r);
          add(c.cx + c.r, c.cy + c.r);
        });
        (segments || []).forEach(seg => (seg.shows || []).forEach(show => {
          const m = showMatrix(show, seg);
          const size = showFontSize(show, seg);
          const adv = showAdvanceEstimate(show, seg);
          const ux = size ? m[0] / size : 1;
          const uy = size ? m[1] / size : 0;
          add(m[4], m[5]);
          add(m[4] + ux * adv, m[5] + uy * adv);
        }));

        if (!xs.length) return null;
        const x0 = Math.min(...xs), x1 = Math.max(...xs);
        const y0 = Math.min(...ys), y1 = Math.max(...ys);
        return rectLike(x0, y0, x1 - x0, y1 - y0);
      }

      function inferEditableTextAlign(matrix, font, text, context) {
        const oldText = cleanEditableText(text);
        if (!oldText || !font || !font.widthOf) return 'left';

        const oldW = Math.max(0, font.widthOf(oldText, 1));
        const size = Math.max(1, Math.hypot(matrix[0], matrix[1]));
        if (!isFinite(oldW) || oldW <= 0 || !isFinite(size)) return 'left';

        const ux = matrix[0] / size;
        const uy = matrix[1] / size;
        const project = (x, y) => x * ux + y * uy;
        const start = project(matrix[4], matrix[5]);
        const center = project(matrix[4] + matrix[0] * oldW * 0.5, matrix[5] + matrix[1] * oldW * 0.5);
        const end = project(matrix[4] + matrix[0] * oldW, matrix[5] + matrix[1] * oldW);
        const anchors = [];
        const addAnchor = (x, y) => {
          if (isFinite(x) && isFinite(y)) anchors.push(project(x, y));
        };
        const ctx = context || {};

        addTextAnchorSamples(ctx.pageRect || rectLike(0, 0, ctx.pageW || 0, ctx.pageH || 0), addAnchor);
        addTextAnchorSamples(ctx.artworkRect, addAnchor);
        addTextAnchorSamples(ctx.plotRect, addAnchor);

        if (!anchors.length) return 'left';
        const dist = v => anchors.reduce((d, a) => Math.min(d, Math.abs(v - a)), Infinity);
        const leftD = dist(start);
        const centerD = dist(center);
        const rightD = dist(end);
        const tol = Math.max(10, size * 1.35);

        if (leftD <= tol && leftD < centerD * 0.65 && leftD <= rightD) return 'left';
        if (rightD <= tol && rightD < centerD * 0.65 && rightD < leftD) return 'right';
        if (centerD <= tol * 2.5 || centerD <= leftD || centerD <= rightD) return 'center';
        return 'center';
      }

      function paddedRect(rect, pad) {
        return [rect[0] - pad, rect[1] - pad, rect[2] + pad, rect[3] + pad];
      }


      function showMatrix(show, seg) {
        return (show && show.matrix) || (seg && seg.matrix) || [seg && seg.size || 12, 0, 0, seg && seg.size || 12, seg && seg.x || 0, seg && seg.y || 0];
      }

      function showFontSize(show, seg) {
        const m = showMatrix(show, seg);
        return Math.max(1, Math.hypot(m[0], m[1]));
      }

      function showAdvanceEstimate(show, seg) {
        const text = String(show && show.text || '');
        const size = showFontSize(show, seg);
        const visible = cleanEditableText(text);
        if (!visible) return size * 0.35;
        return Math.max(size * 0.3, visible.length * size * 0.52);
      }

      function looksLikeWordContinuation(prevText, nextText) {
        const a = String(prevText || '').replace(/\s+/g, '');
        const b = String(nextText || '').replace(/\s+/g, '');
        if (!a || !b) return false;
        if (/[-‐-―'’]$/.test(a) || /^['’]/.test(b)) return true;
        if (/[A-Za-z]$/.test(a) && /^[a-z]/.test(b)) return true;
        return false;
      }

      function shouldStartNewEditableTextGroup(seg, group, show) {
        if (!group.length || !/\S/.test(String(show && show.text || ''))) return false;

        const prev = group[group.length - 1];
        if (!/\S/.test(String(prev && prev.text || ''))) return false;

        const pm = showMatrix(prev, seg);
        const sm = showMatrix(show, seg);
        const size = showFontSize(prev, seg);
        const ux = pm[0] / size;
        const uy = pm[1] / size;
        const dx = sm[4] - pm[4];
        const dy = sm[5] - pm[5];
        const along = dx * ux + dy * uy;
        const cross = Math.abs(dx * -uy + dy * ux);
        const expected = showAdvanceEstimate(prev, seg);
        const gap = along - expected;

        if (cross > size * 0.9 || along < -size * 0.65) return true;
        if (gap <= size * 1.25) return false;
        if (looksLikeWordContinuation(prev.text, show.text) && gap <= size * 2.4) return false;
        return true;
      }

      function splitEditableTextShows(seg, shows) {
        const groups = [];
        let group = [];

        for (const show of shows || []) {
          if (shouldStartNewEditableTextGroup(seg, group, show)) {
            if (cleanEditableText(group.map(s => s.text).join(''))) groups.push(group);
            group = [];
          }
          group.push(show);
        }

        if (cleanEditableText(group.map(s => s.text).join(''))) groups.push(group);
        return groups;
      }

      const nearest = (color, candidates) => {
        let best = 0, bd = Infinity;
        candidates.forEach((c, i) => {
          const d = (c[0] - color[0]) ** 2 + (c[1] - color[1]) ** 2 + (c[2] - color[2]) ** 2;
          if (d < bd) { bd = d; best = i; }
        });
        return best;
      };

      const isRgb = color => Array.isArray(color) && color.length === 3 && color.every(v => typeof v === 'number' && isFinite(v));
      const cloneRgb = color => isRgb(color) ? color.map(v => Math.max(0, Math.min(1, v))) : null;

      const DEFAULTS = {
        topFill: [0.525, 0.122, 0.255], topStroke: [0.898, 0.459, 0.122],
        stdFill: [0.459, 0.471, 0.482], stdStroke: [0.843, 0.824, 0.796],
        numColor: [0.889, 0.889, 0.889], legendColor: [0.525, 0.122, 0.255],
        strokeW: 4, numSize: 18,
        radii: { 1: 17.302, 3: 29.975, 5: 38.693 },
        legend: { size: 21.8046, lineFactor: 1.48 },
      };

      function cloneRadii(r) {
        return { 1: r[1], 3: r[3], 5: r[5] };
      }

      function inferRadiiFromBubbles(bubbles) {
        const rs = [...new Set((bubbles || []).map(b => Math.round(b.r * 2) / 2))]
          .filter(r => isFinite(r) && r > 0)
          .sort((a, b) => a - b);

        if (rs.length >= 3) return { 1: rs[0], 3: rs[Math.floor(rs.length / 2)], 5: rs[rs.length - 1] };
        if (rs.length === 2) return { 1: rs[0], 3: (rs[0] + rs[1]) / 2, 5: rs[1] };
        if (rs.length === 1) return { 1: rs[0] * 0.58, 3: rs[0], 5: rs[0] * 1.29 };

        return cloneRadii(DEFAULTS.radii);
      }

      function applyBubbleSizeOverride(style, opts, sourceRadii) {
        const minD = parseFloat(opts.bubbleMinDiameter);
        const maxD = parseFloat(opts.bubbleMaxDiameter);

        if (!isFinite(minD) && !isFinite(maxD)) return;

        const minR = isFinite(minD) && minD > 0 ? minD / 2 : sourceRadii[1];
        const maxR = isFinite(maxD) && maxD > 0 ? maxD / 2 : sourceRadii[5];

        if (!(maxR > minR)) return;

        const midRatio = sourceRadii[5] > sourceRadii[1]
          ? Math.max(0, Math.min(1, (sourceRadii[3] - sourceRadii[1]) / (sourceRadii[5] - sourceRadii[1])))
          : 0.5;

        style.radii = {
          1: minR,
          3: minR + midRatio * (maxR - minR),
          5: maxR,
        };
      }

      function styleTextSegments(segments, plotRect) {
        const inPlot = (x, y) => x > plotRect.x - 2 && x < plotRect.x + plotRect.w + 2 && y > plotRect.y - 2 && y < plotRect.y + plotRect.h + 2;
        const KEEP = new Set(['graph legend', 'number', 'risk', 'graphlegend', 'graph', 'legend']);
        let numSeg = null, legendNamesSeg = null;

        for (const seg of segments || []) {
          if (!seg || !seg.shows || !seg.shows.length) continue;

          const allDigits = seg.shows.every(s => /^\d+$/.test(s.text.trim()) || s.text.trim() === '');

          if (inPlot(seg.x, seg.y) && allDigits) {
            if (!numSeg || seg.shows.length > numSeg.shows.length) numSeg = seg;
            continue;
          }

          if (seg.x > plotRect.x + plotRect.w - 5) {
            const letterShows = seg.shows.filter(s => /[A-Za-z]/.test(s.text));
            const isHeaderSeg = letterShows.length > 0 && letterShows.every(s => KEEP.has(s.text.trim().toLowerCase().replace(/\s+/g, ' ')))
              && seg.shows.length <= 4;

            if (!isHeaderSeg && letterShows.length >= 2 &&

            }
          }
        }

        return { numSeg, legendNamesSeg };
      }

      function inferBubbleStyle(bubbles, segments, plotRect) {
        const style = JSON.parse(JSON.stringify(DEFAULTS));
        const fills = (bubbles || []).filter(b => /^f/i.test(b.paint) || /^b/i.test(b.paint));
        const strokes = (bubbles || []).filter(b => b.paint === 'S' || b.paint === 's' || /^b/i.test(b.paint));

          if (topIdx.length) style.topFill = topIdx[0].fill.slice();
          if (stdIdx.length) style.stdFill = stdIdx[0].fill.slice();

        if (strokes.length) {
          const t = [], s2 = [];
          strokes.forEach(b => (nearest(b.stroke, [DEFAULTS.topStroke, DEFAULTS.stdStroke]) === 0 ? t : s2).push(b));
          if (t.length) style.topStroke = t[0].stroke.slice();
          if (s2.length) style.stdStroke = s2[0].stroke.slice();

          if (numSeg && numSeg.fill) style.numColor = numSeg.fill.slice();
          if (numSeg && isFinite(numSeg.size)) style.numSize = numSeg.size;
          if (legendNamesSeg && legendNamesSeg.fill) style.legendColor = legendNamesSeg.fill.slice();

      function applyBubbleStyleOverrides(style, opts) {

        const strokeW = parseFloat(opts.strokeW);
        if (isFinite(strokeW) && strokeW >= 0) style.strokeW = strokeW;

        const numSize = parseFloat(opts.numSize);
        if (isFinite(numSize) && numSize > 0) style.numSize = numSize;
      }

      /* ---------------- main generation ---------------- */
      async function generate(pdfBytes, risks, opts) {
        opts = Object.assign({ topN: 10, axisMin: 0, axisMax: 6, dateText: null, bubbleMinDiameter: null, bubbleMaxDiameter: null, topFill: null, topStroke: null, stdFill: null, stdStroke: null, strokeW: null, numSize: null, numColor: null, legendColor: null, staticTextEdits: null, fontFiles: null, fontkit: null, log: () => { } }, opts || {});
        const log = opts.log;

        risks = risks
          .filter(r => r && r.name && isFinite(r.impact) && isFinite(r.likelihood))
          .map(r => ({ ...r, velocity: isFinite(r.velocity) ? r.velocity : 3, num: isFinite(r.num) ? r.num : 0 }));

        if (!risks.length) throw new Error('No risks with numeric Impact & Likelihood to draw.');

        const pdfDoc = await PDFDocument.load(pdfBytes, { ignoreEncryption: true, updateMetadata: false });
        const ctx = pdfDoc.context;
        const page = pdfDoc.getPage(0);
        const pageW = page.getWidth();
        const pageH = page.getHeight();

        const contentsRef = page.node.get(PDFName.of('Contents'));
        const streamRefs = [];
        const lkp = o => (o instanceof PDFRef) ? ctx.lookup(o) : o;

          else if (!filter) bytes = raw;

        const artworkRect = inferArtworkRect(circles, segments, plotRect);
        log(`Plot area: x=${plotRect.x.toFixed(1)} y=${plotRect.y.toFixed(1)} w=${plotRect.w.toFixed(1)} h=${plotRect.h.toFixed(1)}`);

        const inPlot = (x, y) => x > plotRect.x - 2 && x < plotRect.x + plotRect.w + 2 && y > plotRect.y - 2 && y < plotRect.y + plotRect.h + 2;
        const bubbles = circles.filter(c => inPlot(c.cx, c.cy) && c.range);
        log(`Found ${bubbles.length} bubble paint operations (${new Set(bubbles.map(b => b.cx.toFixed(1) + ',' + b.cy.toFixed(1))).size} distinct bubbles) to remove.`);

        const style = inferBubbleStyle(bubbles, segments, plotRect);
        const sourceRadii = cloneRadii(style.radii);
        applyBubbleSizeOverride(style, opts, sourceRadii);
        applyBubbleStyleOverrides(style, opts);

        log(`Velocity radii: 1→${style.radii[1].toFixed(1)}  3→${style.radii[3].toFixed(1)}  5→${style.radii[5].toFixed(1)}; stroke ${style.strokeW}pt`);

        const removals = bubbles.map(b => b.range);
        const textRemovalStarts = new Set();
        const removeShow = show => {
          if (!show) return;

        const KEEP = new Set(['graph legend', 'number', 'risk', 'graphlegend', 'graph', 'legend']);
        let numSeg = null, legendNamesSeg = null, dateSeg = null;
        const legendDigitShows = [];

        for (const seg of segments) {
          if (!seg.shows.length) continue;

          const joined = seg.shows.map(s => s.text).join('');
          const allDigits = seg.shows.every(s => /^\d+$/.test(s.text.trim()) || s.text.trim() === '');

          if (inPlot(seg.x, seg.y) && allDigits) {
            if (!numSeg || seg.shows.length > numSeg.shows.length) numSeg = seg;
            seg.shows.forEach(removeShow);
            continue;
          }

          if (seg.x > plotRect.x + plotRect.w - 5) {
            const letterShows = seg.shows.filter(s => /[A-Za-z]/.test(s.text));
            const isHeaderSeg = letterShows.length > 0 && letterShows.every(s => KEEP.has(s.text.trim().toLowerCase().replace(/\s+/g, ' ')))
              && seg.shows.length <= 4;

            if (isHeaderSeg) continue;

            seg.shows.forEach(s => {

            });

            if (letterShows.length >= 2 && (!legendNamesSeg || letterShows.length > legendNamesSeg.shows.filter(s => /[A-Za-z]/.test(s.text)).length)) {

        if (opts.dateText && dateSeg) dateSeg.shows.forEach(removeShow);
        const staticTextEdits = opts.staticTextEdits && typeof opts.staticTextEdits === 'object' ? opts.staticTextEdits : {};
        const staticTextCandidates = [];

        function staticTextKey(seg, shows, text) {

          const keptShows = seg.shows.filter(show => !textRemovalStarts.has(show.start));
          if (!keptShows.length) continue;

          for (const showGroup of splitEditableTextShows(seg, keptShows)) {

            const key = staticTextKey(seg, showGroup, text);
            const value = Object.prototype.hasOwnProperty.call(staticTextEdits, key)
              ? cleanEditableText(staticTextEdits[key])
              : text;

            const item = {
              key,
              text,
              value,
              isEdited: value !== text,
              shows: showGroup,
              fontRes: showGroup[0].fontRes || seg.fontRes,
              fill: seg.fill.slice(),
              matrix: showMatrix(showGroup[0], seg).slice(),

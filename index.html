        log(`Removing ${removals.length} drawing ranges (bubbles, bubble numbers, legend rows${opts.dateText && dateSeg ? ', date text' : ''}${staticTextCandidates.some(t => t.isEdited) ? ', edited static text' : ''}).`);

        removals.sort((a, b) => b[0] - a[0]);
        let newContent = content;
        let lastStart = Infinity;

        for (const [s, e] of removals) {
          if (e > lastStart) continue;
          newContent = newContent.slice(0, s) + ' ' + newContent.slice(e);
          lastStart = s;
        }

        /* --- fonts for new content --- */
        const uploadedFiles = Array.isArray(opts.fontFiles) ? opts.fontFiles : [];
        const wantsCustom = !!(opts.fontkit && uploadedFiles.length);
        if (wantsCustom) pdfDoc.registerFontkit(opts.fontkit);

        const resDict = lkp(page.node.get(PDFName.of('Resources')));
        let fontDict = lkp(resDict.get(PDFName.of('Font')));
        if (!fontDict) { fontDict = ctx.obj({}); resDict.set(PDFName.of('Font'), fontDict); }

        const freshName = base => {
          let i = 0;
          while (fontDict.get(PDFName.of(base + i))) i++;
          return base + i;
        };

        const helv = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const helvBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
        const helvRes = '/' + freshName('FRM');
        const helvBoldRes = '/' + freshName('FRMB');

        fontDict.set(PDFName.of(helvRes.slice(1)), helv.ref);
        fontDict.set(PDFName.of(helvBoldRes.slice(1)), helvBold.ref);

        const fbReg = makePdfLibFontAdapter(helv, helvRes, 'Helvetica');
        const fbBold = makePdfLibFontAdapter(helvBold, helvBoldRes, 'Helvetica-Bold');

        const origAdapter = res => {
          if (!res) return null;
          const fd = fontDict.get(PDFName.of(res.replace(/^\//, '')));
          return fd ? makeOriginalFontAdapter(ctx, fd, res) : null;
        };

        const digitsNeeded = risks.map(r => String(r.num)).join('');

        const modalFont = (seg, filter) => {
          if (!seg) return null;
          const counts = {};
          seg.shows.filter(filter || (() => true)).forEach(s => { if (s.fontRes) counts[s.fontRes] = (counts[s.fontRes] || 0) + 1; });
          let best = null, bn = 0;
          for (const k in counts) if (counts[k] > bn) { bn = counts[k]; best = k; }
          return best;
        };

        const uploadedFontCache = new Map();

        async function embedMatchedUploadedFont(file, label) {
          const key = file.name + ':' + (file.bytes && file.bytes.length || 0);
          if (uploadedFontCache.has(key)) return uploadedFontCache.get(key);

          try {
            const font = await pdfDoc.embedFont(file.bytes, { subset: false });
            const res = '/' + freshName('FUP');
            fontDict.set(PDFName.of(res.slice(1)), font.ref);
            const adapter = makePdfLibFontAdapter(font, res, file.meta && file.meta.fullName || file.name, 'uploaded');
            uploadedFontCache.set(key, adapter);
            log(`${label} font: matched uploaded font "${file.name}" to source font.`);
            return adapter;
          } catch (e) {
            log(`${label} font: uploaded font "${file.name}" failed (${e.message}); trying another fallback.`);
            uploadedFontCache.set(key, null);
            return null;
          }
        }

        async function matchedUploadedFont(original, text, label) {
          if (!wantsCustom || !original) return null;

          const targetNames = original.targetNames && original.targetNames.length ? original.targetNames : [original.fontName, original.res];
          const ranked = uploadedFiles
            .map(file => ({ file, score: scoreUploadedFontMatch(file, targetNames) }))
            .filter(x => x.score >= 260)
            .sort((a, b) => b.score - a.score);

          for (const item of ranked) {
            const adapter = await embedMatchedUploadedFont(item.file, label);
            if (adapter && adapter.canRender(text)) return adapter;
          }

          if (ranked.length) log(`${label} font: no matched uploaded font could render all required characters.`);
          return null;
        }

        async function fontForResource(res, text, fallback, label) {
          const original = origAdapter(res);
          if (original && original.canRender(text)) return original;

          const matched = await matchedUploadedFont(original, text, label);
          if (matched) return matched;

          return fallback;
        }

        const namesText = risks.map(r => r.name).join('');
        const numFont = await fontForResource(modalFont(numSeg), digitsNeeded, fbBold, 'Bubble-number');
        const legendFont = await fontForResource(modalFont(legendNamesSeg, s2 => /[A-Za-z]/.test(s2.text)), namesText + digitsNeeded, fbReg, 'Legend');

        const fontLabel = f => {
          if (!f) return 'none';
          if (f.kind === 'original') return 'reusing embedded ' + f.res + ' (' + f.label + ')';
          if (f.kind === 'uploaded') return 'matched uploaded ' + f.label;
          return f.label + ' fallback';
        };

        log(`Bubble-number font: ${fontLabel(numFont)}; legend font: ${fontLabel(legendFont)}`);

        const span = opts.axisMax - opts.axisMin;
        const X = lk => plotRect.x + ((lk - opts.axisMin) / span) * plotRect.w;
        const Y = im => plotRect.y + ((im - opts.axisMin) / span) * plotRect.h;

        const radiusFor = v => {
          const r = style.radii;
          if (v <= 1) return r[1];
          if (v >= 5) return r[5];
          if (v === 3) return r[3];
          return v < 3 ? r[1] + (v - 1) / 2 * (r[3] - r[1]) : r[3] + (v - 3) / 2 * (r[5] - r[3]);
        };

        const numColor = style.numColor;
        const numSize0 = style.numSize;

        const editItems = [];
        const staticOut = [];
        const bubbleOut = [];
        const legendOut = [];
        const dateOut = [];

        for (const item of staticTextCandidates) {
          const drawText = item.value;
          const hitText = drawText || item.text || 'Text';
          const sourceFont = await fontForResource(item.fontRes, item.text || hitText, fbReg, 'Editable text source');
          const font = await fontForResource(item.fontRes, hitText, fbReg, 'Editable text');
          const align = inferEditableTextAlign(item.matrix, sourceFont, item.text || hitText, { pageW, pageH, plotRect, artworkRect });
          const drawMatrix = alignedTextMatrix(item.matrix, sourceFont, item.text || hitText, font, hitText, align);
          const rect = textBoundsFor(font, hitText, drawMatrix);

          editItems.push({
            type: 'static-text',
            key: item.key,
            value: item.text,
            text: item.text,
            align,
            rect,
          });

          if (item.isEdited) {
            if (!drawText) continue;
            staticOut.push('BT');
            staticOut.push(`${fmt(item.fill[0])} ${fmt(item.fill[1])} ${fmt(item.fill[2])} rg`);
            staticOut.push(`${font.res} 1 Tf`);
            staticOut.push(textMatrixToTm(drawMatrix));
            staticOut.push(`${font.encode(drawText)} Tj`);
            staticOut.push('ET');
          }
        }

        const circleOverlaps = (a, b) => Math.hypot(a.cx - b.cx, a.cy - b.cy) < (a.rad + b.rad);
        const rectForLabel = (item, width, size, dx, dy) => ({
          x0: item.cx + dx - width / 2,
          x1: item.cx + dx + width / 2,
          y0: item.cy + dy - size * 0.46,
          y1: item.cy + dy + size * 0.46,
        });

        const rectInsideBubble = (rect, item) => {
          const rr = Math.max(1, item.rad - style.strokeW * 0.6);
          return [[rect.x0, rect.y0], [rect.x1, rect.y0], [rect.x0, rect.y1], [rect.x1, rect.y1]]
            .every(([x, y]) => Math.hypot(x - item.cx, y - item.cy) <= rr);
        };

        const circleRectPenalty = (circle, rect) => {
          const nx = Math.max(rect.x0, Math.min(circle.cx, rect.x1));
          const ny = Math.max(rect.y0, Math.min(circle.cy, rect.y1));
          if (Math.hypot(nx - circle.cx, ny - circle.cy) >= circle.rad) return 0;

          const probes = [
            [(rect.x0 + rect.x1) / 2, (rect.y0 + rect.y1) / 2],
            [rect.x0, rect.y0], [rect.x1, rect.y0], [rect.x0, rect.y1], [rect.x1, rect.y1],
            [(rect.x0 + rect.x1) / 2, rect.y0], [(rect.x0 + rect.x1) / 2, rect.y1],
            [rect.x0, (rect.y0 + rect.y1) / 2], [rect.x1, (rect.y0 + rect.y1) / 2],
          ];

          return probes.reduce((sum, [x, y]) => sum + (Math.hypot(x - circle.cx, y - circle.cy) < circle.rad ? 1 : 0), 1);
        };

        function chooseLabelOffset(item, laterItems, width, size) {
          const blockers = laterItems.filter(b => circleOverlaps(item, b));
          if (!blockers.length) return { dx: 0, dy: 0 };

          const score = (dx, dy) => {
            const rect = rectForLabel(item, width, size, dx, dy);
            if (!rectInsideBubble(rect, item)) return Infinity;
            return blockers.reduce((sum, b) => sum + circleRectPenalty(b, rect), 0);
          };

          const step = item.rad * 0.32;
          const candidates = [
            [0, 0],
            [0, step], [0, -step], [step, 0], [-step, 0],
            [step * 0.72, step * 0.72], [-step * 0.72, step * 0.72],
            [step * 0.72, -step * 0.72], [-step * 0.72, -step * 0.72],
            [0, step * 0.48], [0, -step * 0.48], [step * 0.48, 0], [-step * 0.48, 0],
          ];

          let best = { dx: 0, dy: 0, score: score(0, 0) };

          for (const [dx, dy] of candidates.slice(1)) {
            const s = score(dx, dy);
            if (s < best.score) best = { dx, dy, score: s };
            if (s === 0) break;
          }

          return best.score < score(0, 0) ? best : { dx: 0, dy: 0 };
        }

        const bubbleItems = risks.map(r => {
          const top = (r.rank ?? r.num) <= opts.topN;
          const cx = Math.max(plotRect.x, Math.min(plotRect.x + plotRect.w, X(r.likelihood)));
          const cy = Math.max(plotRect.y, Math.min(plotRect.y + plotRect.h, Y(r.impact)));
          const rad = radiusFor(r.velocity);
          const item = {
            r,
            top,
            cx,
            cy,
            rad,
            fill: top ? style.topFill : style.stdFill,
            stroke: top ? style.topStroke : style.stdStroke,
          };

          r._cx = cx;
          r._cy = cy;
          r._r = rad;

          return item;
        }).sort((a, b) => b.rad - a.rad || a.r.num - b.r.num);

        /* Bubble groups are drawn largest-to-smallest so smaller bubbles stay visible above larger ones. */
        bubbleItems.forEach((item, i) => {
          const label = String(item.r.num);
          let size = numSize0;
          let w = numFont.widthOf(label, size);

          if (w > item.rad * 1.7) {
            size = size * (item.rad * 1.7) / w;
            w = numFont.widthOf(label, size);
          }

          const off = chooseLabelOffset(item, bubbleItems.slice(i + 1), w, size);
          const tx = item.cx + off.dx - w / 2;
          const ty = item.cy + off.dy - size * 0.36;
          const labelRect = rectForLabel(item, w, size, off.dx, off.dy);

          bubbleOut.push('q');
          bubbleOut.push(`${fmt(item.fill[0])} ${fmt(item.fill[1])} ${fmt(item.fill[2])} rg`);
          if (style.strokeW > 0) {
            bubbleOut.push(`${fmt(item.stroke[0])} ${fmt(item.stroke[1])} ${fmt(item.stroke[2])} RG`);
            bubbleOut.push(`${fmt(style.strokeW)} w`);
          }
          bubbleOut.push(circlePath(item.cx, item.cy, item.rad));
          bubbleOut.push(style.strokeW > 0 ? 'B' : 'f');
          bubbleOut.push('BT');
          bubbleOut.push(`${fmt(numColor[0])} ${fmt(numColor[1])} ${fmt(numColor[2])} rg`);
          bubbleOut.push(`${numFont.res} 1 Tf`);
          bubbleOut.push(`${fmt(size)} 0 0 ${fmt(size)} ${fmt(tx)} ${fmt(ty)} Tm`);
          bubbleOut.push(`${numFont.encode(label)} Tj`);
          bubbleOut.push('ET');
          bubbleOut.push('Q');

          if (item.r._id != null) {
            editItems.push({
              type: 'risk-num',
              id: item.r._id,
              value: label,
              rect: [labelRect.x0, labelRect.y0, labelRect.x1, labelRect.y1]
            });
          }
        });

        const lg = {
          namesX: legendNamesSeg ? legendNamesSeg.x : plotRect.x + plotRect.w + 132,
          topY: legendNamesSeg ? legendNamesSeg.y : plotRect.y + plotRect.h - 96,
          size: legendNamesSeg ? legendNamesSeg.size : DEFAULTS.legend.size,
          color: style.legendColor,
        };

        const spacing0 = lg.size * DEFAULTS.legend.lineFactor;
        const bottomMargin = 52;
        const avail = lg.topY - bottomMargin;
        const spacing = Math.min(spacing0, risks.length > 1 ? avail / (risks.length - 1) : avail);
        const lsize = lg.size * Math.min(1, spacing / spacing0);
        const maxNameW = pageW - lg.namesX - 24;

        legendOut.push('BT');
        legendOut.push(`${fmt(lg.color[0])} ${fmt(lg.color[1])} ${fmt(lg.color[2])} rg`);

        risks.slice().sort((a, b) => a.num - b.num).forEach((r, i) => {
          const y = lg.topY - i * spacing;
          const numLabel = String(r.num);
          const nf = numFont.canRender(numLabel) ? numFont : fbBold;
          const nw = nf.widthOf(numLabel, lsize);
          const numX = lg.namesX - lsize * 0.9 - nw;

          legendOut.push(`${nf.res} 1 Tf`);
          legendOut.push(`${fmt(lsize)} 0 0 ${fmt(lsize)} ${fmt(numX)} ${fmt(y)} Tm`);
          legendOut.push(`${nf.encode(numLabel)} Tj`);

          let nm = r.name;
          while (nm.length > 1 && legendFont.widthOf(nm + '…', lsize) > maxNameW && legendFont.widthOf(nm, lsize) > maxNameW) nm = nm.slice(0, -1);
          if (nm !== r.name) nm = nm.trimEnd() + (legendFont.canRender('…') ? '…' : '...');

          const nameW = Math.min(maxNameW, Math.max(legendFont.widthOf(nm, lsize), 140));

          legendOut.push(`${legendFont.res} 1 Tf`);
          legendOut.push(`${fmt(lsize)} 0 0 ${fmt(lsize)} ${fmt(lg.namesX)} ${fmt(y)} Tm`);
          legendOut.push(`${legendFont.encode(nm)} Tj`);

          if (r._id != null) {
            editItems.push({
              type: 'risk-num',
              id: r._id,
              value: numLabel,
              rect: [numX - 4, y - lsize * 0.25, lg.namesX - lsize * 0.15, y + lsize * 1.05]
            });
            editItems.push({
              type: 'risk-name',
              id: r._id,
              value: r.name,
              rect: [lg.namesX - 4, y - lsize * 0.25, Math.min(pageW - 16, lg.namesX + nameW + 8), y + lsize * 1.05]
            });
          }
        });

        legendOut.push('ET');

        if (dateSeg) {
          const oldDateText = dateSeg.shows.map(s => s.text).join('').trim();
          const currentDateText = opts.dateText || oldDateText;
          const dateMatrix = showMatrix(dateSeg.shows[0], dateSeg).slice();
          const sourceDateFont = await fontForResource(dateSeg.fontRes, oldDateText || currentDateText || 'Date', fbBold, 'Date');
          const sourceRect = textBoundsFor(sourceDateFont, oldDateText || currentDateText || 'Date', dateMatrix);
          let editRect = paddedRect(sourceRect, 8);

          if (opts.dateText) {
            const dFont = await fontForResource(dateSeg.fontRes, opts.dateText, fbBold, 'Date');
            const drawMatrix = centeredTextMatrix(dateMatrix, sourceDateFont, oldDateText, dFont, opts.dateText);
            const drawRect = textBoundsFor(dFont, opts.dateText, drawMatrix);
            editRect = paddedRect([
              Math.min(sourceRect[0], drawRect[0]),
              Math.min(sourceRect[1], drawRect[1]),
              Math.max(sourceRect[2], drawRect[2]),
              Math.max(sourceRect[3], drawRect[3]),
            ], 8);

            dateOut.push('BT');
            dateOut.push(`${fmt(dateSeg.fill[0])} ${fmt(dateSeg.fill[1])} ${fmt(dateSeg.fill[2])} rg`);
            dateOut.push(`${dFont.res} 1 Tf`);
            dateOut.push(textMatrixToTm(drawMatrix));
            dateOut.push(`${dFont.encode(opts.dateText)} Tj`);
            dateOut.push('ET');
          }

          editItems.push({
            type: 'date',
            value: currentDateText,
            rect: editRect
          });
        }

        const enc = s => {
          const b = new Uint8Array(s.length);
          for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i) & 0xFF;
          return b;
        };

        const mkStream = (str) => {
          const deflated = pako.deflate(enc(str));
          const dict = ctx.obj({ Filter: 'FlateDecode', Length: deflated.length });
          return ctx.register(PDFRawStream.of(dict, deflated));
        };

        function ensureLayerResources(layers) {
          let props = lkp(resDict.get(PDFName.of('Properties')));

          if (!props) {
            props = ctx.obj({});
            resDict.set(PDFName.of('Properties'), props);
          }

          const refs = layers.map(({ tag, title }) => {
            const key = PDFName.of(tag);
            const existing = props.get(key);

            if (existing instanceof PDFRef) return existing;

            const dict = ctx.obj({});
            dict.set(PDFName.of('Type'), PDFName.of('OCG'));
            dict.set(PDFName.of('Name'), PDFString.of(title));

            const ref = ctx.register(dict);
            props.set(key, ref);

            return ref;
          });

          const ocProps = ctx.obj({});
          const defaults = ctx.obj({});

          defaults.set(PDFName.of('Order'), ctx.obj(refs));
          defaults.set(PDFName.of('ON'), ctx.obj(refs));

          ocProps.set(PDFName.of('OCGs'), ctx.obj(refs));
          ocProps.set(PDFName.of('D'), defaults);

          pdfDoc.catalog.set(PDFName.of('OCProperties'), ocProps);
        }

        const layerDefs = [
          { tag: 'HM_Text', title: 'Heat Map Text' },
          { tag: 'HM_Bubbles', title: 'Heat Map Bubbles' },
          { tag: 'HM_Legend', title: 'Heat Map Legend' },
          { tag: 'HM_Date', title: 'Heat Map Date' },
        ];

        ensureLayerResources(layerDefs);

        const layerContent = (tag, lines) => lines.length
          ? [`/OC /${tag} BDC`, 'q', ...lines, 'Q', 'EMC'].join('\n')
          : '';

        const refs = [
          mkStream(newContent),
          mkStream(layerContent('HM_Text', staticOut)),
          mkStream(layerContent('HM_Bubbles', bubbleOut)),
          mkStream(layerContent('HM_Legend', legendOut)),
        ];

        if (dateOut.length) refs.push(mkStream(layerContent('HM_Date', dateOut)));

        page.node.set(PDFName.of('Contents'), ctx.obj(refs));

        try {
          const pieceInfo = lkp(page.node.get(PDFName.of('PieceInfo')));
          if (pieceInfo) {
            const ill = lkp(pieceInfo.get(PDFName.of('Illustrator')));
            if (ill) {
              const priv = ill.get(PDFName.of('Private'));
              const privDict = lkp(priv);
              if (privDict && privDict.entries) {
                for (const [, val] of privDict.entries()) if (val instanceof PDFRef) ctx.delete(val);
              }
              if (priv instanceof PDFRef) ctx.delete(priv);
            }

            const pir = page.node.get(PDFName.of('PieceInfo'));
            if (pir instanceof PDFRef) ctx.delete(pir);
            page.node.delete(PDFName.of('PieceInfo'));
          }

          const thumb = page.node.get(PDFName.of('Thumb'));
          if (thumb) {
            if (thumb instanceof PDFRef) ctx.delete(thumb);
            page.node.delete(PDFName.of('Thumb'));
          }
        } catch (e) {
          log('Note: could not strip Illustrator private data (' + e.message + ') - output is still valid.');
        }

        const bytes = await pdfDoc.save({ useObjectStreams: false });

        return {
          bytes,
          info: {
            bubblesRemoved: bubbles.length,
            plotRect,
            style,
            oldDate: dateSeg ? dateSeg.shows.map(s => s.text).join('').trim() : null,
            editItems
          }
        };
      }


      async function generateEmptyDataPreview(pdfBytes, opts) {
        opts = Object.assign({ dateText: null, staticTextEdits: null, fontFiles: null, fontkit: null, log: () => { } }, opts || {});
        const log = opts.log;

        const pdfDoc = await PDFDocument.load(pdfBytes, { ignoreEncryption: true, updateMetadata: false });
        const ctx = pdfDoc.context;
        const page = pdfDoc.getPage(0);
        const pageW = page.getWidth();
        const pageH = page.getHeight();
        const lkp = o => (o instanceof PDFRef) ? ctx.lookup(o) : o;
        const contentsRef = page.node.get(PDFName.of('Contents'));
        const streamRefs = [];

        if (contentsRef instanceof PDFRef) streamRefs.push(contentsRef);
        else if (lkp(contentsRef) instanceof PDFArray) lkp(contentsRef).asArray().forEach(r => streamRefs.push(r));

        const bytesToLatin1 = (bytes) => {
          let s = '';
          for (let i = 0; i < bytes.length; i += 60000) s += String.fromCharCode.apply(null, bytes.subarray(i, i + 60000));
          return s;
        };

        let content = '';

        for (const ref of streamRefs) {
          const stm = lkp(ref);
          const raw = stm.contents || stm.getContents?.();
          const filter = stm.dict.get(PDFName.of('Filter'));
          const fname = filter && filter.asString ? filter.asString() : (filter ? String(filter) : '');
          let bytes;

          if (/Flate/.test(fname)) bytes = pako.inflate(raw);
          else if (!filter) bytes = raw;
          else throw new Error('Unsupported content stream filter: ' + fname);

          content += bytesToLatin1(bytes) + '\n';
        }

        const { circles, plotRect, segments } = analyze(content);
        if (!plotRect) throw new Error('Could not locate the plot area in the Illustrator file.');
        const artworkRect = inferArtworkRect(circles, segments, plotRect);

        const inPlot = (x, y) => x > plotRect.x - 2 && x < plotRect.x + plotRect.w + 2 && y > plotRect.y - 2 && y < plotRect.y + plotRect.h + 2;
        const bubbles = circles.filter(c => inPlot(c.cx, c.cy) && c.range);
        const removals = bubbles.map(b => b.range);
        const textRemovalStarts = new Set();
        const removeShow = show => {
          if (!show) return;
          textRemovalStarts.add(show.start);
          removals.push([show.start, show.end]);
        };

        const KEEP = new Set(['graph legend', 'number', 'risk', 'graphlegend', 'graph', 'legend']);
        let dateSeg = null;

        for (const seg of segments) {
          if (!seg.shows.length) continue;

          const joined = seg.shows.map(s => s.text).join('');
          const allDigits = seg.shows.every(s => /^\d+$/.test(s.text.trim()) || s.text.trim() === '');

          if (inPlot(seg.x, seg.y) && allDigits) {
            seg.shows.forEach(removeShow);
            continue;
          }

          if (seg.x > plotRect.x + plotRect.w - 5) {
            const letterShows = seg.shows.filter(s => /[A-Za-z]/.test(s.text));
            const isHeaderSeg = letterShows.length > 0 && letterShows.every(s => KEEP.has(s.text.trim().toLowerCase().replace(/\s+/g, ' ')))
              && seg.shows.length <= 4;

            if (isHeaderSeg) continue;

            seg.shows.forEach(s => {
              if (KEEP.has(s.text.trim().toLowerCase())) return;
              removeShow(s);
            });

            continue;
          }

          if (seg.y > plotRect.y + plotRect.h && /^(January|February|March|April|May|June|July|August|September|October|November|December)\s*\d{4}$/i.test(joined.trim())) {
            dateSeg = seg;
          }
        }

        if (opts.dateText && dateSeg) dateSeg.shows.forEach(removeShow);

        const staticTextEdits = opts.staticTextEdits && typeof opts.staticTextEdits === 'object' ? opts.staticTextEdits : {};
        const staticTextCandidates = [];

        function staticTextKey(seg, shows, text) {
          const first = shows[0];
          return ['text', first ? first.start : 0, Math.round(seg.x * 10), Math.round(seg.y * 10), cleanEditableText(text).toLowerCase().replace(/[^a-z0-9]+/g, '-')].join(':');
        }

        for (const seg of segments) {
          if (!seg || seg === dateSeg || !seg.shows || !seg.shows.length) continue;

          const keptShows = seg.shows.filter(show => !textRemovalStarts.has(show.start));
          if (!keptShows.length) continue;

          for (const showGroup of splitEditableTextShows(seg, keptShows)) {
            const text = cleanEditableText(showGroup.map(show => show.text).join(''));
            if (!/[A-Za-z]/.test(text)) continue;

            const key = staticTextKey(seg, showGroup, text);
            const value = Object.prototype.hasOwnProperty.call(staticTextEdits, key)
              ? cleanEditableText(staticTextEdits[key])
              : text;

            const item = {
              key,
              text,
              value,
              isEdited: value !== text,
              shows: showGroup,
              fontRes: showGroup[0].fontRes || seg.fontRes,
              fill: seg.fill.slice(),
              matrix: showMatrix(showGroup[0], seg).slice(),
            };

            if (item.isEdited) showGroup.forEach(removeShow);
            staticTextCandidates.push(item);
          }
        }

        removals.sort((a, b) => b[0] - a[0]);
        let newContent = content;
        let lastStart = Infinity;

        for (const [s, e] of removals) {
          if (e > lastStart) continue;
          newContent = newContent.slice(0, s) + ' ' + newContent.slice(e);
          lastStart = s;
        }

        const resDict = lkp(page.node.get(PDFName.of('Resources')));
        let fontDict = lkp(resDict.get(PDFName.of('Font')));
        if (!fontDict) { fontDict = ctx.obj({}); resDict.set(PDFName.of('Font'), fontDict); }

        const freshName = base => {
          let i = 0;
          while (fontDict.get(PDFName.of(base + i))) i++;
          return base + i;
        };

        const helv = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const helvBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
        const helvRes = '/' + freshName('FRM');
        const helvBoldRes = '/' + freshName('FRMB');

        fontDict.set(PDFName.of(helvRes.slice(1)), helv.ref);
        fontDict.set(PDFName.of(helvBoldRes.slice(1)), helvBold.ref);

        const fbReg = makePdfLibFontAdapter(helv, helvRes, 'Helvetica');
        const fbBold = makePdfLibFontAdapter(helvBold, helvBoldRes, 'Helvetica-Bold');

        const uploadedFiles = Array.isArray(opts.fontFiles) ? opts.fontFiles : [];
        const wantsCustom = !!(opts.fontkit && uploadedFiles.length);
        if (wantsCustom) pdfDoc.registerFontkit(opts.fontkit);

        const origAdapter = res => {
          if (!res) return null;
          const fd = fontDict.get(PDFName.of(res.replace(/^\//, '')));
          return fd ? makeOriginalFontAdapter(ctx, fd, res) : null;
        };

        const uploadedFontCache = new Map();

        async function embedMatchedUploadedFont(file, label) {
          const key = file.name + ':' + (file.bytes && file.bytes.length || 0);
          if (uploadedFontCache.has(key)) return uploadedFontCache.get(key);

          try {
            const font = await pdfDoc.embedFont(file.bytes, { subset: false });
            const res = '/' + freshName('FUP');
            fontDict.set(PDFName.of(res.slice(1)), font.ref);
            const adapter = makePdfLibFontAdapter(font, res, file.meta && file.meta.fullName || file.name, 'uploaded');
            uploadedFontCache.set(key, adapter);
            log(`${label} font: matched uploaded font "${file.name}" to source font.`);
            return adapter;
          } catch (e) {
            uploadedFontCache.set(key, null);
            return null;
          }
        }

        async function matchedUploadedFont(original, text, label) {
          if (!wantsCustom || !original) return null;

          const targetNames = original.targetNames && original.targetNames.length ? original.targetNames : [original.fontName, original.res];
          const ranked = uploadedFiles
            .map(file => ({ file, score: scoreUploadedFontMatch(file, targetNames) }))
            .filter(x => x.score >= 260)
            .sort((a, b) => b.score - a.score);

          for (const item of ranked) {
            const adapter = await embedMatchedUploadedFont(item.file, label);
            if (adapter && adapter.canRender(text)) return adapter;
          }

          return null;
        }

        async function fontForResource(res, text, fallback, label) {
          const original = origAdapter(res);
          if (original && original.canRender(text)) return original;

          const matched = await matchedUploadedFont(original, text, label);
          if (matched) return matched;

          return fallback;
        }

        const editItems = [];
        const staticOut = [];
        const dateOut = [];

        for (const item of staticTextCandidates) {
          const drawText = item.value;
          const hitText = drawText || item.text || 'Text';
          const sourceFont = await fontForResource(item.fontRes, item.text || hitText, fbReg, 'Editable text source');
          const font = await fontForResource(item.fontRes, hitText, fbReg, 'Editable text');
          const align = inferEditableTextAlign(item.matrix, sourceFont, item.text || hitText, { pageW, pageH, plotRect, artworkRect });
          const drawMatrix = alignedTextMatrix(item.matrix, sourceFont, item.text || hitText, font, hitText, align);
          const rect = textBoundsFor(font, hitText, drawMatrix);

          editItems.push({
            type: 'static-text',
            key: item.key,
            value: item.text,
            text: item.text,
            align,
            rect,
          });

          if (item.isEdited) {
            if (!drawText) continue;
            staticOut.push('BT');
            staticOut.push(`${fmt(item.fill[0])} ${fmt(item.fill[1])} ${fmt(item.fill[2])} rg`);
            staticOut.push(`${font.res} 1 Tf`);
            staticOut.push(textMatrixToTm(drawMatrix));
            staticOut.push(`${font.encode(drawText)} Tj`);
            staticOut.push('ET');
          }
        }

        if (dateSeg) {
          const oldDateText = dateSeg.shows.map(s => s.text).join('').trim();
          const currentDateText = opts.dateText || oldDateText;
          const dateMatrix = showMatrix(dateSeg.shows[0], dateSeg).slice();
          const sourceDateFont = await fontForResource(dateSeg.fontRes, oldDateText || currentDateText || 'Date', fbBold, 'Date');
          const sourceRect = textBoundsFor(sourceDateFont, oldDateText || currentDateText || 'Date', dateMatrix);
          let editRect = paddedRect(sourceRect, 8);

          if (opts.dateText) {
            const dFont = await fontForResource(dateSeg.fontRes, opts.dateText, fbBold, 'Date');
            const drawMatrix = centeredTextMatrix(dateMatrix, sourceDateFont, oldDateText, dFont, opts.dateText);
            const drawRect = textBoundsFor(dFont, opts.dateText, drawMatrix);
            editRect = paddedRect([
              Math.min(sourceRect[0], drawRect[0]),
              Math.min(sourceRect[1], drawRect[1]),
              Math.max(sourceRect[2], drawRect[2]),
              Math.max(sourceRect[3], drawRect[3]),
            ], 8);

            dateOut.push('BT');
            dateOut.push(`${fmt(dateSeg.fill[0])} ${fmt(dateSeg.fill[1])} ${fmt(dateSeg.fill[2])} rg`);
            dateOut.push(`${dFont.res} 1 Tf`);
            dateOut.push(textMatrixToTm(drawMatrix));
            dateOut.push(`${dFont.encode(opts.dateText)} Tj`);
            dateOut.push('ET');
          }

          editItems.push({
            type: 'date',
            value: currentDateText,
            rect: editRect
          });
        }

        const enc = s => {
          const b = new Uint8Array(s.length);
          for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i) & 0xFF;
          return b;
        };

        const mkStream = (str) => {
          const deflated = pako.deflate(enc(str));
          const dict = ctx.obj({ Filter: 'FlateDecode', Length: deflated.length });
          return ctx.register(PDFRawStream.of(dict, deflated));
        };

        const refs = [mkStream(newContent)];
        if (staticOut.length) refs.push(mkStream(['q', ...staticOut, 'Q'].join('\n')));
        if (dateOut.length) refs.push(mkStream(['q', ...dateOut, 'Q'].join('\n')));
        page.node.set(PDFName.of('Contents'), ctx.obj(refs));

        const bytes = await pdfDoc.save({ useObjectStreams: false });

        return {
          bytes,
          info: {
            bubblesRemoved: bubbles.length,
            plotRect,
            oldDate: dateSeg ? dateSeg.shows.map(s => s.text).join('').trim() : null,
            editItems
          }
        };
      }

      async function inspect(pdfBytes) {
        const pdfDoc = await PDFDocument.load(pdfBytes, { ignoreEncryption: true, updateMetadata: false });
        const ctx = pdfDoc.context;
        const page = pdfDoc.getPage(0);
        const lkp = o => (o instanceof PDFRef) ? ctx.lookup(o) : o;
        const contentsRef = page.node.get(PDFName.of('Contents'));
        const streamRefs = [];

        if (contentsRef instanceof PDFRef) streamRefs.push(contentsRef);
        else if (lkp(contentsRef) instanceof PDFArray) lkp(contentsRef).asArray().forEach(r => streamRefs.push(r));

        let content = '';

        for (const ref of streamRefs) {
          const stm = lkp(ref);
          const filter = stm.dict.get(PDFName.of('Filter'));
          const fname = filter && filter.asString ? filter.asString() : (filter ? String(filter) : '');
          let bytes;

          if (/Flate/.test(fname)) bytes = pako.inflate(stm.contents);
          else if (!filter) bytes = stm.contents;
          else throw new Error('Unsupported content stream filter: ' + fname);

          let s2 = '';
          for (let i = 0; i < bytes.length; i += 60000) s2 += String.fromCharCode.apply(null, bytes.subarray(i, i + 60000));
          content += s2 + '\n';
        }

        const { circles, plotRect, segments } = analyze(content);
        if (!plotRect) throw new Error('Could not locate the plot area in this file.');

        const inPlot = (x, y) => x > plotRect.x - 2 && x < plotRect.x + plotRect.w + 2 && y > plotRect.y - 2 && y < plotRect.y + plotRect.h + 2;
        const plotBubbles = circles.filter(c => inPlot(c.cx, c.cy));
        const distinct = new Set(plotBubbles.map(c => c.cx.toFixed(1) + ',' + c.cy.toFixed(1)));
        const style = inferBubbleStyle(plotBubbles, segments, plotRect);
        const radii = style.radii;

        let dateText = null;
        for (const seg of segments) {
          const j = seg.shows.map(s => s.text).join('').trim();
          if (seg.y > plotRect.y + plotRect.h && /^(January|February|March|April|May|June|July|August|September|October|November|December)\s*\d{4}$/i.test(j)) {
            dateText = j.replace(/(\d)/, ' $1').replace(/\s+/g, ' ').trim();
          }
        }

        return {
          bubbleCount: distinct.size,
          plotRect,
          dateText,
          radii,
          bubbleDiameters: { min: radii[1] * 2, mid: radii[3] * 2, max: radii[5] * 2 },
          style,
          pageSize: { w: page.getWidth(), h: page.getHeight() }
        };
      }

      return { parseRisksFromWorkbook, rankRisks, generate, generateEmptyDataPreview, inspect, analyze, tokenize };
    }));
  </script>

  <script>
    (function () {
      'use strict';

      const $ = id => document.getElementById(id);
      const log = (...a) => console.log('[bubblr]', ...a);

      let aiBytes = null;
      let aiName = null;
      let aiLoading = false;
      let workbook = null;
      let workbookName = null;
      let lastValidSheetSelection = '';
      let risks = null;
      let lastBytes = null;
      let staticTextEdits = {};

      const fonts = { files: [] };
      let nextRiskId = 1;

      document.body.classList.add('start');

      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }

      const readAB = f => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(new Uint8Array(r.result));
        r.onerror = rej;
        r.readAsArrayBuffer(f);
      });

      function reservePreviewBox(w, h) {
        if (!(w > 0 && h > 0)) return;
        const c = $('pvCanvas');
        c.width = Math.round(w);
        c.height = Math.round(h);
        $('pv').classList.add('primed');
      }

      async function primePreviewBox(bytes) {
        try {
          const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true, updateMetadata: false });
          const page = doc.getPage(0);
          reservePreviewBox(page.getWidth(), page.getHeight());
        } catch (e) { /* keep the temporary preview box */ }
      }

      function rgbToHex(color) {
        const toByte = v => Math.max(0, Math.min(255, Math.round((isFinite(v) ? v : 0) * 255)));
        return '#' + (color || [0, 0, 0]).slice(0, 3).map(v => toByte(v).toString(16).padStart(2, '0')).join('').toUpperCase();
      }

      function normalizeHex(hex) {
        const raw = String(hex || '').trim().replace(/^#/, '');
        if (/^[0-9a-f]{3}$/i.test(raw)) return '#' + raw.split('').map(c => c + c).join('').toUpperCase();
        if (/^[0-9a-f]{6}$/i.test(raw)) return '#' + raw.toUpperCase();
        return null;
      }

      function hexToRgb(hex) {
        const normalized = normalizeHex(hex);
        if (!normalized) return null;
        return [1, 3, 5].map(i => parseInt(normalized.slice(i, i + 2), 16) / 255);
      }

      function updateHexSwatch(input) {
        const wrap = input.closest('.hexPick');
        const swatch = wrap && wrap.querySelector('.swatch');
        const typed = String(input.value || '').trim();
        const normalized = normalizeHex(typed);
        const placeholder = normalizeHex(input.placeholder);
        if (swatch) swatch.style.background = normalized || placeholder || 'transparent';
        if (wrap) wrap.classList.toggle('bad', !!typed && !normalized);
        return normalized;
      }

      function setHexPlaceholder(id, value) {
        const input = $(id);
        if (!input) return;
        input.placeholder = normalizeHex(value) || value || 'Auto';
        updateHexSwatch(input);
      }

      function fmtPlaceholderNumber(n) {
        return isFinite(n) ? `${Math.round(n * 100) / 100} auto` : 'Auto';
      }

      function populateBubbleStyleControls(style) {
        if (!style) return;
        if (style.topFill) setHexPlaceholder('optTopFill', rgbToHex(style.topFill));
        if (style.topStroke) setHexPlaceholder('optTopStroke', rgbToHex(style.topStroke));
        if (style.stdFill) setHexPlaceholder('optStdFill', rgbToHex(style.stdFill));
        if (style.stdStroke) setHexPlaceholder('optStdStroke', rgbToHex(style.stdStroke));
        if (style.numColor) setHexPlaceholder('optNumColor', rgbToHex(style.numColor));
        if (style.legendColor) setHexPlaceholder('optLegendColor', rgbToHex(style.legendColor));
        $('optStrokeW').placeholder = fmtPlaceholderNumber(style.strokeW);
        $('optNumSize').placeholder = fmtPlaceholderNumber(style.numSize);
      }

      function hasCoreAssets() {
        return !!(aiBytes && risks && risks.length);
      }

      function hasWorkspace() {
        return aiLoading || !!aiBytes;
      }

      let keepAdvancedOpen = false;
      let dataParseMessage = '';

      function rememberAdvancedOpen() {
        keepAdvancedOpen = keepAdvancedOpen || $('advanced').open;
      }

      function updateLayout() {
        const ready = hasWorkspace();
        const wasOpen = $('advanced').open || keepAdvancedOpen;
        document.body.classList.toggle('ready', ready);
        document.body.classList.toggle('start', !ready);
        if (ready && wasOpen) $('advanced').open = true;
      }

      function ensureRiskIds() {
        if (!risks) return;
        risks.forEach(r => {
          if (r._id == null) r._id = 'risk-' + nextRiskId++;
        });
      }

      function extOf(file) {
        const m = String(file && file.name || '').toLowerCase().match(/\.([^.]+)$/);
        return m ? m[1] : '';
      }

      function isAiFile(file) { return /^(ai|pdf)$/.test(extOf(file)); }
      function isSpreadsheet(file) { return /^(xlsx|xlsm|xls|csv)$/.test(extOf(file)); }
      function isFont(file) { return /^(ttf|otf)$/.test(extOf(file)); }

      function wireDrop(dropId, inputId) {
        const d = $(dropId), inp = $(inputId);

        d.addEventListener('click', e => { if (e.target !== inp) inp.click(); });
        inp.addEventListener('change', () => {
          if (inp.files.length) routeFiles(inp.files);
          inp.value = '';
        });
      }

      async function routeFiles(fileList) {
        const fileArray = [...fileList];
        const aiFile = fileArray.find(isAiFile);
        const xlFile = fileArray.find(isSpreadsheet);
        const fontFiles = fileArray.filter(isFont);

        if (!aiFile && !xlFile && !fontFiles.length) return;

        if (aiFile) await loadIllustratorFile(aiFile);
        if (xlFile) await loadSpreadsheetFile(xlFile);
        if (fontFiles.length) await loadFontFiles(fontFiles);

        updateLayout();
        schedule();
      }

      let pageDragDepth = 0;

      document.addEventListener('dragenter', e => {
        if (!e.dataTransfer || ![...e.dataTransfer.types].includes('Files')) return;
        e.preventDefault();
        pageDragDepth++;
        document.body.classList.add('file-over');
      });

      document.addEventListener('dragover', e => {
        if (!e.dataTransfer || ![...e.dataTransfer.types].includes('Files')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      });

      document.addEventListener('dragleave', e => {
        if (!e.dataTransfer || ![...e.dataTransfer.types].includes('Files')) return;
        pageDragDepth = Math.max(0, pageDragDepth - 1);
        if (!pageDragDepth) document.body.classList.remove('file-over');
      });

      document.addEventListener('drop', e => {
        if (!e.dataTransfer || !e.dataTransfer.files.length) return;
        e.preventDefault();
        pageDragDepth = 0;
        document.body.classList.remove('file-over');
        routeFiles(e.dataTransfer.files);
      });

      function readFontMeta(bytes, fallbackName) {
        if (!window.fontkit || !window.fontkit.create) return { fullName: fallbackName };

        const views = [bytes, bytes.buffer && bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength)].filter(Boolean);

        for (const data of views) {
          try {
            const f = window.fontkit.create(data);
            return {
              postscriptName: f.postscriptName || '',
              fullName: f.fullName || '',
              familyName: f.familyName || '',
              subfamilyName: f.subfamilyName || '',
            };
          } catch (e) { /* try the next representation */ }
        }

        return { fullName: fallbackName };
      }

      function fontMetaLabel(file) {
        const m = file.meta || {};
        return m.fullName || [m.familyName, m.subfamilyName].filter(Boolean).join(' ') || m.postscriptName || file.name;
      }

      function resetSheetOptions() {
        $('optSheet').innerHTML = '<option value="">Auto</option>';
        $('optSheet').disabled = true;
      }

      function populateSheetOptions(selected) {
        const sel = $('optSheet');
        sel.innerHTML = '<option value="">Auto</option>';

        if (!workbook || !workbook.SheetNames || !workbook.SheetNames.length) {
          sel.disabled = true;
          return;
        }

        workbook.SheetNames.forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          sel.appendChild(opt);
        });

        sel.disabled = false;
        sel.value = selected && workbook.SheetNames.includes(selected) ? selected : '';
      }

      function parseSelectedWorkbookSheet() {
        if (!workbook) return null;

        const selectedSheet = $('optSheet').value || null;
        const parsed = RiskMapCore.parseRisksFromWorkbook(XLSX, workbook, { sheetName: selectedSheet });
        const parsedRisks = parsed.risks;

        risks = parsedRisks;
        dataParseMessage = '';
        lastValidSheetSelection = $('optSheet').value || '';
        ensureRiskIds();
        $('dropXl').classList.add('loaded');
        $('xlLabel').textContent = `${workbookName} - ${risks.length} risks`;

        log(`Spreadsheet "${workbookName}": ${risks.length} risks parsed from ${parsed.sourceType} worksheet "${parsed.sheetName}".`);
        console.table(risks.map(r => ({
          num: r.num,
          risk: r.name,
          impact: r.impact,
          likelihood: r.likelihood,
          velocity: r.velocity,
          score: r.score,
          rank: r.rank
        })));

        renderTable();
        return parsed;
      }

      async function renderSourcePreview() {
        if (!aiBytes || !window.pdfjsLib) return;

        try {
          const result = await RiskMapCore.generateEmptyDataPreview(aiBytes, {
            ...opts(),
            fontFiles: fonts.files,
            fontkit: window.fontkit || null,
            log: m => log(m),
          });
          await renderPreview(result.bytes, result.info.editItems || []);
        } catch (err) {
          console.warn('[bubblr] Could not render the cleaned Illustrator preview:', err.message);
          try { await renderPreview(aiBytes, []); } catch (fallbackErr) { /* leave the existing preview alone */ }
        }
      }

      function clearParsedData(message) {
        risks = null;
        lastBytes = null;
        dataParseMessage = message || 'No parseable risk data on this worksheet.';
        $('btnDl').disabled = true;
        renderTable();
        updateLayout();
        renderSourcePreview();
      }

      /* ---------- file handlers ---------- */
      async function loadIllustratorFile(f) {
        aiLoading = true;
        $('pv').classList.add('busy', 'loading');
        $('pv').classList.remove('primed');
        reservePreviewBox(16, 10);
        updateLayout();
        await new Promise(requestAnimationFrame);

        try {
          aiBytes = await readAB(f);
          aiName = f.name;
          staticTextEdits = {};
          lastBytes = null;

          $('dropAi').classList.add('loaded');
          $('aiLabel').textContent = f.name;
          await primePreviewBox(aiBytes);
          await new Promise(requestAnimationFrame);

          const info = await RiskMapCore.inspect(aiBytes);

          if (info.dateText) $('optDate').placeholder = info.dateText;

          if (info.bubbleDiameters) {
            $('optBubbleMin').placeholder = `${info.bubbleDiameters.min.toFixed(1)} auto`;
            $('optBubbleMax').placeholder = `${info.bubbleDiameters.max.toFixed(1)} auto`;
          }

          populateBubbleStyleControls(info.style);

          log(`Illustrator file "${f.name}":`, info);

        } catch (err) {
          aiBytes = null;
          aiName = null;
          lastBytes = null;
          $('dropAi').classList.remove('loaded');
          $('aiLabel').textContent = '.ai';
          $('btnDl').disabled = true;
          $('pv').classList.remove('busy', 'loading', 'primed');
          console.error('[bubblr] Could not read the Illustrator file:', err.message,
            '- the .ai must be saved with PDF compatibility (Illustrator default).');
        } finally {
          aiLoading = false;
          updateLayout();
        }
      }

      async function loadSpreadsheetFile(f) {
        const prevWorkbook = workbook;
        const prevWorkbookName = workbookName;
        const prevRisks = risks;
        const prevLastBytes = lastBytes;
        const prevSheetSelection = lastValidSheetSelection;
        const prevParseMessage = dataParseMessage;
        const prevSelectedOption = $('optSheet').value || '';

        let nextWorkbook;

        try {
          nextWorkbook = XLSX.read(await readAB(f), { type: 'array' });
        } catch (err) {
          workbook = prevWorkbook;
          workbookName = prevWorkbookName;
          risks = prevRisks;
          lastBytes = prevLastBytes;
          lastValidSheetSelection = prevSheetSelection;
          dataParseMessage = prevParseMessage;

          if (workbook) {
            populateSheetOptions(prevSelectedOption);
            $('dropXl').classList.add('loaded');
            $('xlLabel').textContent = dataParseMessage
              ? `${workbookName} - no parseable data`
              : `${workbookName} - ${risks ? risks.length : 0} risks`;
          } else {
            $('dropXl').classList.remove('loaded');
            $('xlLabel').textContent = '.xlsx / .xlsm';
            resetSheetOptions();
            $('btnDl').disabled = true;
          }

          renderTable();
          updateLayout();

          console.error('[bubblr] Could not read the spreadsheet:', err.message);
          return;
        }

        workbook = nextWorkbook;
        workbookName = f.name;
        lastValidSheetSelection = '';
        dataParseMessage = '';
        populateSheetOptions('');

        try {
          parseSelectedWorkbookSheet();
        } catch (err) {
          clearParsedData(err.message || 'No parseable risk data on this worksheet.');
          $('dropXl').classList.add('loaded');
          $('xlLabel').textContent = `${workbookName} - no parseable data`;
          console.warn('[bubblr] Spreadsheet loaded, but no worksheet contains valid risk data:', err.message);
        }
      }

      async function loadFontFiles(files) {
        if (!window.fontkit) {
          console.warn('[bubblr] fontkit unavailable. custom fonts cannot be embedded.');
          return;
        }

        const loaded = [];

        for (const f of files) {
          const bytes = await readAB(f);
          const meta = readFontMeta(bytes, f.name);
          const item = { name: f.name, bytes, meta };
          loaded.push(item);
          log(`Loaded font "${f.name}"${fontMetaLabel(item) !== f.name ? ` (${fontMetaLabel(item)})` : ''}.`);
        }

        fonts.files = loaded;

        $('dropFont').classList.toggle('loaded', fonts.files.length > 0);
        $('fontLabel').textContent = fonts.files.length
          ? `${fonts.files.length} font${fonts.files.length === 1 ? '' : 's'} loaded`
          : 'optional .ttf / .otf';
      }

      wireDrop('dropAi', 'fileAi');
      wireDrop('dropXl', 'fileXl');
      wireDrop('dropFont', 'fileFont');

      /* ---------- advanced controls ---------- */
      $('advanced').addEventListener('toggle', () => {
        if (!$('advanced').open) keepAdvancedOpen = false;
      });

      $('advanced').querySelector('.adv').addEventListener('click', e => e.stopPropagation());
      $('advanced').querySelector('.adv').addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') e.stopPropagation();
      });

      const colorControlIds = ['optTopFill', 'optTopStroke', 'optStdFill', 'optStdStroke', 'optNumColor', 'optLegendColor'];

      colorControlIds.forEach(id => {
        const input = $(id);
        const swatch = document.querySelector(`.swatch[data-color-for="${id}"]`);
        updateHexSwatch(input);

        input.addEventListener('input', () => {
          updateHexSwatch(input);
          rememberAdvancedOpen();
          schedule();
        });

        input.addEventListener('blur', () => {
          const normalized = updateHexSwatch(input);
          if (normalized) input.value = normalized;
        });

        if (swatch) swatch.addEventListener('click', () => {
          input.focus();
          input.select();
        });
      });

      ['optTopN', 'optMin', 'optMax', 'optDate', 'optBubbleMin', 'optBubbleMax', 'optNumSize', 'optStrokeW'].forEach(id => {
        $(id).addEventListener('input', () => {
          rememberAdvancedOpen();
          if (id === 'optTopN') paintTopMarks();
          schedule();
        });
      });

      $('optSheet').addEventListener('change', () => {
        rememberAdvancedOpen();

        try {
          parseSelectedWorkbookSheet();
          updateLayout();
          schedule();
        } catch (err) {
          clearParsedData(err.message || 'No parseable risk data on this worksheet.');
          $('xlLabel').textContent = `${workbookName} - no parseable data`;
          console.warn('[bubblr] Selected worksheet does not contain valid risk data:', err.message);
        }
      });

      const opts = () => ({
        topN: Math.max(0, parseInt($('optTopN').value || '10', 10)),
        axisMin: parseFloat($('optMin').value || '0'),
        axisMax: parseFloat($('optMax').value || '6'),
        dateText: $('optDate').value.trim() || null,
        bubbleMinDiameter: $('optBubbleMin').value === '' ? null : parseFloat($('optBubbleMin').value),
        bubbleMaxDiameter: $('optBubbleMax').value === '' ? null : parseFloat($('optBubbleMax').value),
        topFill: hexToRgb($('optTopFill').value),
        topStroke: hexToRgb($('optTopStroke').value),
        stdFill: hexToRgb($('optStdFill').value),
        stdStroke: hexToRgb($('optStdStroke').value),
        strokeW: $('optStrokeW').value === '' ? null : parseFloat($('optStrokeW').value),
        numSize: $('optNumSize').value === '' ? null : parseFloat($('optNumSize').value),
        numColor: hexToRgb($('optNumColor').value),
        legendColor: hexToRgb($('optLegendColor').value),
        staticTextEdits,
      });

      /* ---------- editable data table ---------- */
      const COLS = [
        { k: 'num', cls: 'n', step: '1' },
        { k: 'name' },
        { k: 'impact', cls: 'n', step: '0.05' },
        { k: 'likelihood', cls: 'n', step: '0.05' },
        { k: 'velocity', cls: 'n', step: '1' },
        { k: 'score', cls: 'n', step: '0.1' },
      ];

      function renderTable() {
        const has = !!(risks && risks.length);
        const showMessage = !!dataParseMessage && !!workbook && !has;

        $('dataMsg').style.display = showMessage ? '' : 'none';
        $('dataMsg').textContent = showMessage ? dataParseMessage : '';
        $('tableWrap').style.display = has ? '' : 'none';
        $('addRow').style.display = has ? '' : 'none';

        if (!has) {
          $('riskTable').tBodies[0].innerHTML = '';
          return;
        }

        const tb = $('riskTable').tBodies[0];
        tb.innerHTML = '';

        risks.forEach((r, idx) => {
          const tr = document.createElement('tr');

          for (const c of COLS) {
            const td = document.createElement('td');
            const inp = document.createElement('input');

            if (c.cls) {
              inp.className = c.cls;
              inp.type = 'number';
              inp.step = c.step;
            }

            inp.value = r[c.k] ?? '';

            inp.addEventListener('input', () => {
              r[c.k] = c.cls ? (inp.value === '' ? null : parseFloat(inp.value)) : inp.value;
              RiskMapCore.rankRisks(risks);
              paintTopMarks();
              schedule();
            });

            td.appendChild(inp);
            tr.appendChild(td);
          }

          const td = document.createElement('td');
          td.className = 'x';

          const del = document.createElement('button');
          del.textContent = '✕';
          del.title = 'Remove row';
          del.addEventListener('click', () => {
            risks.splice(idx, 1);
            RiskMapCore.rankRisks(risks);
            renderTable();
            schedule();
          });

          td.appendChild(del);
          tr.appendChild(td);
          tb.appendChild(tr);
        });

        paintTopMarks();
      }

      function paintTopMarks() {
        if (!risks) return;

        const n = Math.max(0, parseInt($('optTopN').value || '10', 10));

        [...$('riskTable').tBodies[0].rows].forEach((tr, i) => {
          const r = risks[i];
          tr.classList.toggle('top', !!r && (r.rank ?? r.num) <= n);
        });
      }

      $('addRow').addEventListener('click', () => {
        if (!risks) risks = [];

        const maxNum = risks.reduce((m, r) => Math.max(m, r.num || 0), 0);

        risks.push({
          _id: 'risk-' + nextRiskId++,
          num: maxNum + 1,
          name: 'New risk',
          impact: 3,
          likelihood: 3,
          velocity: 3,
          score: null
        });

        RiskMapCore.rankRisks(risks);
        renderTable();
        schedule();
      });

      /* ---------- generation + live preview ---------- */
      let timer = null;
      let busy = false;
      let dirty = false;
      let previewState = { items: [], viewport: null };
      let previewResizeFrame = 0;
      let previewRevealId = 0;
      let activePreviewEdit = null;

      function schedule() {
        rememberAdvancedOpen();
        clearTimeout(timer);
        timer = setTimeout(regen, 350);
      }

      async function generateWithFontFallback(valid, o) {
        try {
          return await RiskMapCore.generate(aiBytes, valid, {
            ...o,
            fontFiles: fonts.files,
            fontkit: window.fontkit || null,
            log: m => log(m),
          });
        } catch (fontErr) {
          if (!fonts.files.length) throw fontErr;
          console.warn('[bubblr] Custom font generation failed; retrying with embedded/source fonts only:', fontErr);
          return RiskMapCore.generate(aiBytes, valid, {
            ...o,
            fontFiles: [],
            fontkit: null,
            log: m => log(m),
          });
        }
      }

      async function regen() {
        updateLayout();

        if (!hasCoreAssets()) {
          $('btnDl').disabled = true;
          lastBytes = null;
          if (aiBytes) await renderSourcePreview();
          else $('editLayer').innerHTML = '';
          return;
        }

        if (busy) {
          dirty = true;
          return;
        }

        busy = true;
        dirty = false;
        $('pv').classList.add('busy');

        try {
          const o = opts();

          if (!(o.axisMax > o.axisMin)) throw new Error('Axis max must be greater than axis min.');

          ensureRiskIds();
          const valid = risks.filter(r => r.name && r.impact != null && r.likelihood != null);

          const { bytes, info } = await generateWithFontFallback(valid, o);

          lastBytes = bytes;
          $('btnDl').disabled = false;

          await renderPreview(bytes, info.editItems || []);

          log(`Preview updated - ${valid.length} bubbles (${info.bubblesRemoved} old paint ops replaced).`);
        } catch (err) {
          console.error('[bubblr] Generation failed:', err);
        } finally {
          busy = false;
          $('pv').classList.remove('busy');
          updateLayout();

          if (dirty) schedule();
        }
      }

      async function renderPreview(bytes, editItems) {
        if (!window.pdfjsLib) return;

        const doc = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;

        try {
          const page = await doc.getPage(1);
          const base = page.getViewport({ scale: 1 });
          const availableWidth = $('pv').clientWidth || $('pv').parentElement?.clientWidth || 1060;
          const scale = Math.min(2, Math.max(0.1, availableWidth * (window.devicePixelRatio || 1) / base.width));
          const vp = page.getViewport({ scale });
          const c = document.createElement('canvas');

          c.width = vp.width;
          c.height = vp.height;

          await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;

          $('pv').classList.add('primed');
          $('pv').classList.remove('busy', 'loading');
          await revealPreviewCanvas(c);
          previewState = { items: editItems || [], viewport: vp };
          renderEditLayer(previewState.items, previewState.viewport);
        } finally {
          doc.destroy();
        }
      }

      function revealPreviewCanvas(next) {
        const live = $('pvCanvas');
        const ctx = live.getContext('2d');
        const prev = document.createElement('canvas');
        const hadPreview = live.width > 20 && live.height > 20;
        const instant = matchMedia('(prefers-reduced-motion: reduce)').matches;
        const id = ++previewRevealId;

        prev.width = next.width;
        prev.height = next.height;
        const pctx = prev.getContext('2d');
        pctx.fillStyle = '#fff';
        pctx.fillRect(0, 0, prev.width, prev.height);
        if (hadPreview) pctx.drawImage(live, 0, 0, prev.width, prev.height);

        if (live.width !== next.width) live.width = next.width;
        if (live.height !== next.height) live.height = next.height;

        ctx.globalAlpha = 1;
        ctx.drawImage(prev, 0, 0);

        if (instant) {
          ctx.drawImage(next, 0, 0);
          return Promise.resolve();
        }

        const tile = Math.max(48, Math.min(160, Math.round(next.width / 12)));
        const tiles = [];
        for (let y = 0; y < next.height; y += tile) {
          for (let x = 0; x < next.width; x += tile) {
            const wave = (x / next.width + y / next.height) * 110;
            tiles.push({ x, y, w: Math.min(tile + 1, next.width - x), h: Math.min(tile + 1, next.height - y), delay: wave + Math.random() * 90 });
          }
        }

        const duration = hadPreview ? 260 : 520;
        const ease = t => t * t * (3 - 2 * t);
        const start = performance.now();

        return new Promise(resolve => {
          function frame(now) {
            if (id !== previewRevealId) return resolve();
            const elapsed = now - start;

            ctx.globalAlpha = 1;
            ctx.drawImage(prev, 0, 0);

            let done = true;
            for (const r of tiles) {
              const a = Math.max(0, Math.min(1, (elapsed - r.delay) / duration));
              if (a < 1) done = false;
              if (a <= 0) continue;
              ctx.globalAlpha = ease(a);
              ctx.drawImage(next, r.x, r.y, r.w, r.h, r.x, r.y, r.w, r.h);
            }

            ctx.globalAlpha = 1;
            if (done || elapsed > duration + 260) {
              ctx.drawImage(next, 0, 0);
              resolve();
            } else requestAnimationFrame(frame);
          }
          requestAnimationFrame(frame);
        });
      }

      function syncEditLayerBox() {
        const layer = $('editLayer');
        const c = $('pvCanvas');

        const width = c.clientWidth || 0;
        const height = c.clientHeight || 0;

        layer.style.left = (c.offsetLeft + c.clientLeft) + 'px';
        layer.style.top = (c.offsetTop + c.clientTop) + 'px';
        layer.style.width = width + 'px';
        layer.style.height = height + 'px';

        return width > 0 && height > 0;
      }

      function requestPreviewOverlaySync() {
        if (previewResizeFrame) cancelAnimationFrame(previewResizeFrame);
        previewResizeFrame = requestAnimationFrame(() => {
          previewResizeFrame = 0;
          if (!previewState.viewport || activePreviewEdit) return;
          renderEditLayer(previewState.items, previewState.viewport);
        });
      }

      function renderEditLayer(items, vp) {
        if (activePreviewEdit) return;

        const layer = $('editLayer');
        const c = $('pvCanvas');

        layer.innerHTML = '';

        if (!syncEditLayerBox() || !vp) return;

        const sx = c.clientWidth / c.width || 1;
        const sy = c.clientHeight / c.height || 1;

        for (const item of items || []) {
          if (item.type === 'risk-num') continue;
          if (!item.rect || item.rect.length !== 4) continue;

          const r = vp.convertToViewportRectangle(item.rect);
          const left = Math.min(r[0], r[2]) * sx;
          const top = Math.min(r[1], r[3]) * sy;
          const width = Math.abs(r[2] - r[0]) * sx;
          const height = Math.abs(r[3] - r[1]) * sy;

          if (width < 4 || height < 4) continue;

          const hit = document.createElement('button');
          hit.type = 'button';
          hit.className = 'editHit';
          hit.title = item.type === 'date' ? 'Edit date label' : (item.type === 'static-text' ? 'Edit text label' : 'Edit risk name');
          hit.style.left = left + 'px';
          hit.style.top = top + 'px';
          hit.style.width = width + 'px';
          hit.style.height = height + 'px';
          hit.addEventListener('pointerdown', e => {
            e.preventDefault();
            e.stopPropagation();
            startPreviewEdit(hit, item);
          });
          hit.addEventListener('click', e => e.stopPropagation());

          layer.appendChild(hit);
        }
      }

      function currentPreviewValue(item) {
        if (item.type === 'date') return $('optDate').value || item.value || $('optDate').placeholder || '';
        if (item.type === 'static-text') return staticTextEdits[item.key] ?? item.value ?? item.text ?? '';

        const r = risks && risks.find(x => x._id === item.id);
        if (!r) return item.value || '';

        if (item.type === 'risk-num') return r.num ?? '';
        return r.name ?? '';
      }

      function startPreviewEdit(hit, item) {
        const layer = $('editLayer');
        const input = document.createElement('input');
        const left = parseFloat(hit.style.left) || 0;
        const top = parseFloat(hit.style.top) || 0;
        const width = parseFloat(hit.style.width) || 80;
        const height = parseFloat(hit.style.height) || 22;
        let done = false;

        if (activePreviewEdit && activePreviewEdit.finish) activePreviewEdit.finish(true);

        input.className = 'editInput';
        input.value = currentPreviewValue(item);
        input.style.left = left + 'px';
        input.style.top = top + 'px';
        input.style.width = Math.max(width, item.type === 'risk-name' || item.type === 'static-text' ? 180 : 80) + 'px';
        input.style.minHeight = Math.max(height, 24) + 'px';
        if (item.align) input.style.textAlign = item.align;

        if (item.type === 'risk-num') {
          input.type = 'number';
          input.step = '1';
        }

        const stopInputEvent = e => e.stopPropagation();
        const isInputEvent = e => {
          const path = e.composedPath ? e.composedPath() : [];
          return e.target === input || input.contains(e.target) || path.includes(input);
        };
        const finishFromOutside = e => {
          if (done || isInputEvent(e)) return;
          finish(true);
        };

        function finish(save) {
          if (done) return;
          done = true;

          document.removeEventListener('pointerdown', finishFromOutside, true);
          if (save) commitPreviewEdit(item, input.value);

          input.remove();
          hit.style.display = '';
          if (activePreviewEdit && activePreviewEdit.input === input) activePreviewEdit = null;
          requestPreviewOverlaySync();
        }

        activePreviewEdit = { input, finish };

        ['pointerdown', 'mousedown', 'mouseup', 'click', 'dblclick'].forEach(type => {
          input.addEventListener(type, stopInputEvent);
        });

        input.addEventListener('keydown', e => {
          e.stopPropagation();
          if (e.key === 'Enter') {
            e.preventDefault();
            finish(true);
          } else if (e.key === 'Escape') {
            e.preventDefault();
            finish(false);
          }
        });

        hit.style.display = 'none';
        layer.appendChild(input);
        input.focus();
        input.select();

        requestAnimationFrame(() => {
          if (!done) document.addEventListener('pointerdown', finishFromOutside, true);
        });
      }

      function commitPreviewEdit(item, value) {
        if (item.type === 'date') {
          $('optDate').value = String(value || '').trim();
          schedule();
          return;
        }

        if (item.type === 'static-text') {
          const text = String(value || '').replace(/\s+/g, ' ').trim();
          if (text === String(item.value || '').trim()) delete staticTextEdits[item.key];
          else staticTextEdits[item.key] = text;
          schedule();
          return;
        }

        const r = risks && risks.find(x => x._id === item.id);
        if (!r) return;

        if (item.type === 'risk-num') {
          const n = parseFloat(value);
          if (!isFinite(n)) return;
          r.num = n;
        } else {
          const name = String(value || '').replace(/\s+/g, ' ').trim();
          if (!name) return;
          r.name = name;
        }

        RiskMapCore.rankRisks(risks);
        renderTable();
        schedule();
      }

      function exportFmt(n) {
        const r = Math.round(Number(n || 0) * 1000) / 1000;
        return Object.is(r, -0) ? '0' : String(r);
      }

      function escapeXmlAttr(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      async function pdfBytesToVectorSvg(bytes) {
        if (!window.pdfjsLib || !pdfjsLib.SVGGraphics) {
          throw new Error('PDF.js SVGGraphics is unavailable.');
        }

        const doc = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;

        try {
          const page = await doc.getPage(1);
          const viewport = page.getViewport({ scale: 1 });
          const opList = await page.getOperatorList();
          const svgGfx = new pdfjsLib.SVGGraphics(page.commonObjs, page.objs);

          svgGfx.embedFonts = true;

          const svg = await svgGfx.getSVG(opList, viewport);
          svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          svg.setAttribute('width', exportFmt(viewport.width));
          svg.setAttribute('height', exportFmt(viewport.height));
          svg.setAttribute('viewBox', `0 0 ${exportFmt(viewport.width)} ${exportFmt(viewport.height)}`);

          return new XMLSerializer().serializeToString(svg);
        } finally {
          doc.destroy();
        }
      }

      async function pdfBytesToRasterSvg(bytes) {
        if (!window.pdfjsLib) {
          throw new Error('SVG export requires PDF.js, which is unavailable in this browser build.');
        }

        const doc = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;

        try {
          const page = await doc.getPage(1);
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });

          canvas.width = Math.ceil(viewport.width);
          canvas.height = Math.ceil(viewport.height);
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          await page.render({ canvasContext: ctx, viewport }).promise;

          const width = viewport.width / 2;
          const height = viewport.height / 2;
          const href = canvas.toDataURL('image/png');

          return [
            `<svg xmlns="http://www.w3.org/2000/svg" width="${exportFmt(width)}" height="${exportFmt(height)}" viewBox="0 0 ${exportFmt(width)} ${exportFmt(height)}">`,
            `<image href="${escapeXmlAttr(href)}" width="${exportFmt(width)}" height="${exportFmt(height)}" preserveAspectRatio="none"/>`,
            '</svg>'
          ].join('');
        } finally {
          doc.destroy();
        }
      }

      async function pdfBytesToSvg(bytes) {
        try {
          return await pdfBytesToVectorSvg(bytes);
        } catch (err) {
          console.warn('[bubblr] Vector SVG export unavailable; falling back to raster SVG.', err);
          return pdfBytesToRasterSvg(bytes);
        }
      }

      function canvasToBlob(canvas, type, quality) {
        return new Promise((resolve, reject) => {
          canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Could not create raster export blob.')), type, quality);
        });
      }

      async function pdfBytesToRasterBlob(bytes, type) {
        if (!window.pdfjsLib) {
          throw new Error('PNG/JPG export requires PDF.js, which is unavailable in this browser build.');
        }

        const doc = await pdfjsLib.getDocument({ data: bytes.slice() }).promise;

        try {
          const page = await doc.getPage(1);
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d', { alpha: false });

          canvas.width = Math.ceil(viewport.width);
          canvas.height = Math.ceil(viewport.height);
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          await page.render({ canvasContext: ctx, viewport }).promise;
          return canvasToBlob(canvas, type, type === 'image/jpeg' ? 0.92 : undefined);
        } finally {
          doc.destroy();
        }
      }

      resetSheetOptions();

      if (window.ResizeObserver) {
        const previewObserver = new ResizeObserver(requestPreviewOverlaySync);
        previewObserver.observe($('pv'));
        previewObserver.observe($('pvCanvas'));
      }

      window.addEventListener('resize', requestPreviewOverlaySync);

      async function blobForExportFormat(bytes, format) {
        switch (format) {
          case 'pdf':
            return new Blob([bytes], { type: 'application/pdf' });
          case 'ai':
            return new Blob([bytes], { type: 'application/vnd.adobe.illustrator' });
          case 'svg':
            return new Blob([await pdfBytesToSvg(bytes)], { type: 'image/svg+xml;charset=utf-8' });
          case 'png':
            return pdfBytesToRasterBlob(bytes, 'image/png');
          case 'jpg':
            return pdfBytesToRasterBlob(bytes, 'image/jpeg');
          default:
            throw new Error(`Unsupported export format: ${format}`);
        }
      }

      function downloadBlob(blob, filename) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 30000);
      }

      function outputBaseName() {
        const sourceName = workbookName || aiName || 'heat-map';
        return String(sourceName)
          .replace(/\.[^.\/]+$/i, '')
          .replace(/[\/:*?"<>|]+/g, '-')
          .trim() || 'heat-map';
      }

      $('btnDl').addEventListener('click', async () => {
        if (!lastBytes) return;

        const format = ($('optFormat').value || 'pdf').toLowerCase();
        const filename = `${outputBaseName()}.${format}`;

        try {
          downloadBlob(await blobForExportFormat(lastBytes, format), filename);
          log(`Downloaded "${filename}".`);
        } catch (err) {
          console.error(`[bubblr] Could not export ${format.toUpperCase()}:`, err);
          alert(`Could not export ${format.toUpperCase()}. Check the browser console for details.`);
        }
      });

      updateLayout();
    })();
  </script>
</body>
